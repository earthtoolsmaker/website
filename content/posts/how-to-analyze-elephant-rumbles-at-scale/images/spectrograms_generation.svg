<svg viewBox="0 0 640 280" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <style>
    .lbl { font-size: 14px; font-weight: 700; fill: #1f2937; }
    .rmb { animation: glow 2.8s ease-in-out infinite; }
    .r2{animation-delay:-1.4s}
    @keyframes glow { 0%,100%{opacity:.85} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <!-- a rumble: a stack of harmonic lines, brightest at the fundamental -->
  <g id="rumble">
    <rect x="0" y="0"  width="34" height="2" rx="1" fill="#fcd34d"/>
    <rect x="2" y="5"  width="30" height="2" rx="1" fill="#f9a03c"/>
    <rect x="1" y="10" width="32" height="2" rx="1" fill="#f4703c"/>
    <rect x="3" y="15" width="26" height="1.6" rx="1" fill="#e0556a"/>
  </g>
  <!-- one spectrogram tile (300 x 34): dark magma ground + faint energy streaks + two rumbles -->
  <g id="spec">
    <rect width="300" height="34" rx="3" fill="#3a1163"/>
    <g fill="#7b2d8a" opacity="0.35">
      <rect x="18" y="3" width="2" height="28"/><rect x="40" y="6" width="2" height="24"/>
      <rect x="92" y="4" width="2" height="27"/><rect x="120" y="8" width="2" height="22"/>
      <rect x="158" y="3" width="2" height="28"/><rect x="190" y="7" width="2" height="23"/>
      <rect x="246" y="5" width="2" height="25"/><rect x="276" y="4" width="2" height="27"/>
    </g>
    <g class="rmb" transform="translate(48,9)"><use href="#rumble"/></g>
    <g class="rmb r2" transform="translate(206,11)"><use href="#rumble"/></g>
  </g>
</defs>

<!-- 24-hour waveform (teal) -->
<g fill="#1f7a8c">
  <rect x="42" y="116" width="2.4" height="8"  rx="1"/><rect x="47" y="110" width="2.4" height="20" rx="1"/>
  <rect x="52" y="104" width="2.4" height="32" rx="1"/><rect x="57" y="96"  width="2.4" height="48" rx="1"/>
  <rect x="62" y="88"  width="2.4" height="64" rx="1"/><rect x="67" y="100" width="2.4" height="40" rx="1"/>
  <rect x="72" y="82"  width="2.4" height="76" rx="1"/><rect x="77" y="94"  width="2.4" height="52" rx="1"/>
  <rect x="82" y="86"  width="2.4" height="68" rx="1"/><rect x="87" y="102" width="2.4" height="36" rx="1"/>
  <rect x="92" y="108" width="2.4" height="24" rx="1"/><rect x="97" y="113" width="2.4" height="14" rx="1"/>
  <rect x="102" y="117" width="2.4" height="6" rx="1"/>
</g>
<text class="lbl" x="72" y="190" text-anchor="middle">24-hour audio file</text>

<!-- arrow -->
<line x1="128" y1="120" x2="184" y2="120" stroke="#e29578" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>

<!-- cascade of spectrogram tiles -->
<g transform="translate(210,30)"><use href="#spec"/></g>
<g transform="translate(228,70)"><use href="#spec"/></g>
<g transform="translate(246,110)"><use href="#spec"/></g>
<text font-size="22" font-weight="700" fill="#80838b" x="300" y="166" text-anchor="middle">…</text>
<g transform="translate(228,176)"><use href="#spec"/></g>
<text class="lbl" x="384" y="232" text-anchor="middle">560 spectrograms</text>
</svg>
