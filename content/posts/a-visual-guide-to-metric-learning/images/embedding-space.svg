<svg viewBox="0 0 1040 520" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <linearGradient id="space" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4f9f8"/><stop offset="100%" stop-color="#e7f0ee"/></linearGradient>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 24px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 13.5px; fill: #60626a; }
    .tag   { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .clab  { font-size: 13px; font-weight: 800; fill: #161616; }
    .cap   { font-size: 12px; font-weight: 700; fill: #161616; }
    .q     { animation: qp 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: 50% 50%; }
    @keyframes qp { 0%,100%{opacity:.6} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <!-- brown bear, frontal face -->
  <g id="bearface">
    <circle cx="-34" cy="-32" r="16" fill="#6e4a30"/><circle cx="34" cy="-32" r="16" fill="#6e4a30"/>
    <circle cx="-34" cy="-32" r="7.5" fill="#5a3c26"/><circle cx="34" cy="-32" r="7.5" fill="#5a3c26"/>
    <ellipse cx="0" cy="0" rx="42" ry="39" fill="#6e4a30"/>
    <ellipse cx="0" cy="19" rx="23" ry="19" fill="#8a6648"/>
    <circle cx="-17" cy="-6" r="4.5" fill="#221913"/><circle cx="17" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="11" rx="9" ry="6.5" fill="#2a1d15"/>
    <path d="M0 17 V29" stroke="#2a1d15" stroke-width="2"/>
  </g>
  <!-- trout, faces right (olive-gold) -->
  <g id="trout">
    <linearGradient id="troutg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9c8638"/><stop offset="55%" stop-color="#c2ad5e"/><stop offset="100%" stop-color="#e0d28a"/></linearGradient>
    <path d="M-46 0 L-66 -17 C -57 -7 -57 7 -66 17 Z" fill="#8a7a3a"/>
    <path d="M50 0 C 46 -8 34 -14 18 -16 C 4 -17 -16 -16 -34 -11 C -40 -9 -44 -6 -46 -3 L-46 3 C -44 6 -40 9 -34 11 C -16 16 4 17 18 16 C 34 14 46 8 50 0 Z" fill="url(#troutg)"/>
    <g fill="#2a2620"><circle cx="-32" cy="-4" r="1.7"/><circle cx="-24" cy="3" r="1.6"/><circle cx="-16" cy="-6" r="1.7"/><circle cx="-9" cy="4" r="1.5"/><circle cx="-2" cy="-7" r="1.6"/><circle cx="3" cy="6" r="1.4"/><circle cx="-20" cy="-1" r="1.4"/><circle cx="-11" cy="-1" r="1.3"/></g>
    <path d="M24 8 q 8 2 14 1" stroke="#d6452f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <circle cx="39" cy="-3" r="3.2" fill="#2a2320"/><circle cx="40.1" cy="-4.1" r="1" fill="#fff"/>
  </g>
</defs>

<text class="title" x="32" y="40">The embedding space</text>
<text class="desc"  x="32" y="62">A learned function maps each image to a point — same individual, nearby points.</text>

<!-- ===== thumbnail cards (left) ===== -->
<!-- Bear A · photo 1 -->
<rect x="24" y="90" width="150" height="104" rx="14" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(82,138) scale(0.52)"><use href="#bearface"/></g>
<circle cx="156" cy="106" r="6" fill="#006d77"/>
<text class="desc" x="99" y="182" text-anchor="middle">Bear A · photo 1</text>
<!-- Bear A · photo 2 -->
<rect x="24" y="214" width="150" height="104" rx="14" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(82,262) scale(0.52)"><use href="#bearface"/></g>
<circle cx="156" cy="230" r="6" fill="#006d77"/>
<text class="desc" x="99" y="306" text-anchor="middle">Bear A · photo 2</text>
<!-- Trout B -->
<rect x="24" y="338" width="150" height="104" rx="14" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(92,392) scale(0.74)"><use href="#trout"/></g>
<circle cx="156" cy="354" r="6" fill="#c2ad5e"/>
<text class="desc" x="99" y="430" text-anchor="middle">Trout B</text>

<!-- embed label -->
<text class="tag" x="232" y="80" text-anchor="middle">EMBED</text>

<!-- ===== embedding space ===== -->
<rect x="300" y="78" width="716" height="412" rx="18" fill="url(#space)" stroke="#cdd4d6" stroke-width="1.5"/>

<!-- embed arrows from cards into clusters -->
<g stroke="#e29578" stroke-width="2.4" fill="none" stroke-linecap="round" opacity="0.9">
  <line x1="178" y1="138" x2="452" y2="172" marker-end="url(#arrow)"/>
  <line x1="178" y1="262" x2="486" y2="208" marker-end="url(#arrow)"/>
  <line x1="178" y1="390" x2="836" y2="392" marker-end="url(#arrow)"/>
</g>

<!-- cluster A · Individual A (teal) -->
<text class="clab" x="470" y="132" text-anchor="middle" fill="#006d77">Individual A</text>
<g fill="#006d77"><circle cx="452" cy="172" r="6"/><circle cx="474" cy="160" r="6"/><circle cx="492" cy="178" r="6"/><circle cx="460" cy="196" r="6"/><circle cx="486" cy="200" r="6"/></g>
<!-- cluster C (purple, unlabelled individual) -->
<g fill="#7b6cae"><circle cx="892" cy="168" r="6"/><circle cx="912" cy="158" r="6"/><circle cx="928" cy="176" r="6"/><circle cx="904" cy="190" r="6"/></g>
<!-- cluster D (green, unlabelled individual) -->
<g fill="#3f9e6a"><circle cx="566" cy="392" r="6"/><circle cx="586" cy="382" r="6"/><circle cx="602" cy="400" r="6"/><circle cx="578" cy="414" r="6"/></g>
<!-- cluster B · Individual B (gold) -->
<text class="clab" x="852" y="352" text-anchor="middle" fill="#a98d2e">Individual B</text>
<g fill="#c2ad5e"><circle cx="836" cy="392" r="6"/><circle cx="856" cy="382" r="6"/><circle cx="874" cy="400" r="6"/><circle cx="844" cy="414" r="6"/><circle cx="866" cy="416" r="6"/></g>

<!-- query + nearest neighbours -->
<g stroke="#e29578" stroke-width="1.6" stroke-dasharray="4 3"><circle cx="500" cy="300" r="6.5" fill="#e29578" stroke="none" class="q"/>
  <line x1="500" y1="300" x2="460" y2="196"/>
  <line x1="500" y1="300" x2="486" y2="200"/>
  <line x1="500" y1="300" x2="492" y2="178"/>
</g>
<text class="cap" x="512" y="332" fill="#e29578">query</text>
<text class="desc" x="512" y="350">→ 3 nearest points are Individual A</text>
</svg>
