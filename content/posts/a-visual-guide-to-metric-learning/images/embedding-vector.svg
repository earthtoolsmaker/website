<svg viewBox="0 0 1040 300" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <style>
    .desc { font-size: 13.5px; fill: #60626a; }
    .tag  { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .num  { font-size: 11px; fill: #60626a; font-family: 'DejaVu Sans Mono', monospace; }
    .big  { font-size: 15px; font-weight: 800; fill: #161616; }
    .brk  { font-size: 13px; font-weight: 700; fill: #161616; }
  </style>
  <g id="bearface">
    <circle cx="-34" cy="-32" r="16" fill="#6e4a30"/><circle cx="34" cy="-32" r="16" fill="#6e4a30"/>
    <circle cx="-34" cy="-32" r="7.5" fill="#5a3c26"/><circle cx="34" cy="-32" r="7.5" fill="#5a3c26"/>
    <ellipse cx="0" cy="0" rx="42" ry="39" fill="#6e4a30"/>
    <ellipse cx="0" cy="19" rx="23" ry="19" fill="#8a6648"/>
    <circle cx="-17" cy="-6" r="4.5" fill="#221913"/><circle cx="17" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="11" rx="9" ry="6.5" fill="#2a1d15"/>
    <path d="M0 17 V29" stroke="#2a1d15" stroke-width="2"/>
  </g>
</defs>

<!-- image -->
<rect x="34" y="80" width="150" height="130" rx="16" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(109,148) scale(0.62)"><use href="#bearface"/></g>
<text class="desc" x="109" y="234" text-anchor="middle">one image</text>

<!-- embed arrow -->
<text class="tag" x="225" y="120" text-anchor="middle">EMBED</text>
<line x1="196" y1="148" x2="256" y2="148" stroke="#e29578" stroke-width="3" marker-end="url(#arrow)"/>

<!-- embedding vector (heat strip) -->
<g stroke="#ffffff" stroke-width="2">
  <rect x="272" y="116" width="38" height="64" fill="#0e7c86"/>
  <rect x="310" y="116" width="38" height="64" fill="#9fd3d0"/>
  <rect x="348" y="116" width="38" height="64" fill="#e29578"/>
  <rect x="386" y="116" width="38" height="64" fill="#176074"/>
  <rect x="424" y="116" width="38" height="64" fill="#cdeae8"/>
  <rect x="462" y="116" width="38" height="64" fill="#5fb0bb"/>
  <rect x="500" y="116" width="38" height="64" fill="#f0c3a8"/>
  <rect x="538" y="116" width="38" height="64" fill="#2f97a0"/>
  <rect x="576" y="116" width="38" height="64" fill="#bfe6e4"/>
  <rect x="614" y="116" width="38" height="64" fill="#e29578"/>
</g>
<text class="num" x="291" y="200" text-anchor="middle">0.31</text>
<text class="num" x="329" y="200" text-anchor="middle">-0.12</text>
<text class="num" x="367" y="200" text-anchor="middle">0.88</text>
<text class="num" x="405" y="200" text-anchor="middle">0.04</text>
<text class="big" x="672" y="156" text-anchor="middle">…</text>

<!-- bracket -->
<path d="M272 214 V222 H652 V214" fill="none" stroke="#c2b6b6" stroke-width="1.6"/>
<text class="brk" x="462" y="244" text-anchor="middle">512 numbers — the embedding vector</text>

<!-- point -->
<line x1="700" y1="148" x2="744" y2="148" stroke="#e29578" stroke-width="3" marker-end="url(#arrow)"/>
<circle cx="800" cy="148" r="9" fill="#0e7c86"/>
<text class="big"  x="836" y="142">a single point</text>
<text class="desc" x="836" y="164">in 512-dimensional space</text>
</svg>
