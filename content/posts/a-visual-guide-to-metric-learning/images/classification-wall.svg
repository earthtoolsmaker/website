<svg viewBox="0 0 1040 400" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 13.5px; fill: #60626a; }
    .lab   { font-size: 13px; font-weight: 700; fill: #161616; }
    .labw  { font-size: 13px; font-weight: 700; fill: #fff; }
    .tag   { font-size: 12px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
  </style>
  <!-- brown bear, side profile (faces right) -->
  <g id="bear" fill="#6e4a30">
    <ellipse cx="0" cy="0" rx="26" ry="16"/>
    <circle cx="22" cy="-7" r="11"/>
    <circle cx="16" cy="-16" r="4.2"/><circle cx="29" cy="-16" r="4.2"/>
    <ellipse cx="32" cy="-4" rx="6" ry="4.5" fill="#5a3c26"/><circle cx="37" cy="-5" r="1.5" fill="#221913"/>
    <circle cx="24" cy="-9" r="1.5" fill="#221913"/>
    <rect x="-18" y="9" width="9" height="15" rx="3"/><rect x="-2" y="11" width="9" height="14" rx="3"/><rect x="13" y="10" width="9" height="14" rx="3"/>
  </g>
</defs>

<!-- ============ LEFT PANEL · CLASSIFICATION ============ -->
<rect x="20" y="20" width="480" height="360" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="260" y="58" text-anchor="middle">Classification</text>
<text class="desc"  x="260" y="80" text-anchor="middle">one fixed output slot per known individual</text>

<!-- classifier box -->
<rect x="200" y="96" width="120" height="38" rx="10" fill="#10303a"/>
<text class="labw" x="260" y="120" text-anchor="middle">classifier</text>
<line x1="260" y1="134" x2="260" y2="150" stroke="#e29578" stroke-width="3" marker-end="url(#arrow)"/>

<!-- fixed output rows (probability bars) -->
<g>
  <text class="lab" x="148" y="178" text-anchor="end">Bear #1</text>
  <rect x="160" y="166" width="200" height="16" rx="8" fill="#006d77"/>
  <text class="lab" x="148" y="210" text-anchor="end">Bear #2</text>
  <rect x="160" y="198" width="120" height="16" rx="8" fill="#006d77"/>
  <text class="lab" x="148" y="242" text-anchor="end">Bear #3</text>
  <rect x="160" y="230" width="160" height="16" rx="8" fill="#006d77"/>
</g>

<!-- locked new slot -->
<text class="lab" x="148" y="286" text-anchor="end" fill="#9aa0a6">Bear #4 ?</text>
<rect x="160" y="274" width="200" height="16" rx="8" fill="none" stroke="#c2b6b6" stroke-width="1.6" stroke-dasharray="5 5"/>
<g transform="translate(372,282)" stroke="#b08968" stroke-width="1.8" fill="none">
  <rect x="-6" y="-3" width="12" height="9" rx="2" fill="#f0e3d6"/>
  <path d="M-3 -3 V-6 a3 3 0 0 1 6 0 V-3"/>
</g>

<!-- new bear knocking -->
<g transform="translate(420,210) scale(0.8)"><use href="#bear"/></g>
<circle cx="448" cy="190" r="10" fill="#e29578"/>
<text x="448" y="195" text-anchor="middle" font-size="14" font-weight="800" fill="#fff">?</text>

<text class="tag"  x="260" y="330" text-anchor="middle">NEW IDENTITY → RETRAIN</text>
<text class="desc" x="260" y="352" text-anchor="middle">Adding one individual means a new output</text>
<text class="desc" x="260" y="369" text-anchor="middle">and retraining the whole model.</text>

<!-- ============ RIGHT PANEL · METRIC LEARNING ============ -->
<rect x="540" y="20" width="480" height="360" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="780" y="58" text-anchor="middle">Metric learning</text>
<text class="desc"  x="780" y="80" text-anchor="middle">every individual is just a point in one shared space</text>

<!-- bear → embed → space -->
<g transform="translate(610,150) scale(0.85)"><use href="#bear"/></g>
<text class="tag" x="668" y="140" text-anchor="middle">EMBED</text>
<line x1="648" y1="150" x2="700" y2="150" stroke="#e29578" stroke-width="3" marker-end="url(#arrow)"/>

<!-- embedding space -->
<rect x="712" y="100" width="288" height="200" rx="14" fill="#eef5f2" stroke="#cdd4d6" stroke-width="1.5"/>
<!-- cluster A (teal) -->
<g fill="#006d77"><circle cx="772" cy="150" r="5"/><circle cx="788" cy="138" r="5"/><circle cx="760" cy="138" r="5"/><circle cx="780" cy="160" r="5"/></g>
<!-- cluster B (gold) -->
<g fill="#c2ad5e"><circle cx="930" cy="150" r="5"/><circle cx="946" cy="162" r="5"/><circle cx="918" cy="162" r="5"/><circle cx="934" cy="170" r="5"/></g>
<!-- cluster C (purple) -->
<g fill="#7b6cae"><circle cx="820" cy="248" r="5"/><circle cx="836" cy="238" r="5"/><circle cx="806" cy="238" r="5"/><circle cx="824" cy="258" r="5"/></g>
<!-- the new point dropping in -->
<line x1="884" y1="150" x2="868" y2="210" stroke="#e29578" stroke-width="2" stroke-dasharray="4 4" marker-end="url(#arrow)"/>
<circle cx="864" cy="216" r="6.5" fill="#e29578"/>

<text class="tag"  x="780" y="332" text-anchor="middle">NEW IDENTITY → ADD A POINT</text>
<text class="desc" x="780" y="354" text-anchor="middle">No new outputs, no retraining —</text>
<text class="desc" x="780" y="371" text-anchor="middle">the space already has room.</text>
</svg>
