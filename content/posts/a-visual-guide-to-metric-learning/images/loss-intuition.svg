<svg viewBox="0 0 1040 400" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <marker id="ah" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 21px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 12.5px; fill: #60626a; }
    .dot   { font-size: 13px; font-weight: 800; }
    .note  { font-size: 12px; font-weight: 700; fill: #e29578; }
  </style>
</defs>

<!-- ===== 1 · CONTRASTIVE ===== -->
<rect x="20" y="20" width="316" height="360" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="178" y="56" text-anchor="middle">Contrastive</text>
<text class="desc"  x="178" y="76" text-anchor="middle">judge one pair at a time</text>
<!-- pull (same individual) -->
<text class="note" x="178" y="122" text-anchor="middle">same → pull together</text>
<line x1="120" y1="150" x2="236" y2="150" stroke="#e29578" stroke-width="2.6" marker-start="url(#ah)" marker-end="url(#ah)"/>
<circle cx="112" cy="150" r="8" fill="#006d77"/><circle cx="244" cy="150" r="8" fill="#006d77"/>
<!-- push (different individuals) -->
<text class="note" x="178" y="232" text-anchor="middle">different → push apart</text>
<circle cx="120" cy="300" r="8" fill="#006d77"/><circle cx="236" cy="300" r="8" fill="#7b6cae"/>
<line x1="132" y1="290" x2="92"  y2="270" stroke="#e29578" stroke-width="2.6" marker-end="url(#ah)"/>
<line x1="224" y1="290" x2="264" y2="270" stroke="#e29578" stroke-width="2.6" marker-end="url(#ah)"/>
<circle cx="178" cy="300" r="56" fill="none" stroke="#c2b6b6" stroke-width="1.4" stroke-dasharray="5 5"/>
<text class="desc" x="178" y="356" text-anchor="middle">beyond a fixed margin</text>

<!-- ===== 2 · TRIPLET ===== -->
<rect x="362" y="20" width="316" height="360" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="520" y="56" text-anchor="middle">Triplet</text>
<text class="desc"  x="520" y="76" text-anchor="middle">compare three at once</text>
<!-- anchor, positive, negative -->
<line x1="520" y1="210" x2="468" y2="150" stroke="#006d77" stroke-width="2.6" marker-end="url(#ah)"/>
<line x1="520" y1="210" x2="624" y2="262" stroke="#7b6cae" stroke-width="2.6"/>
<circle cx="520" cy="210" r="9" fill="#e29578"/><text class="dot" x="520" y="236" text-anchor="middle" fill="#e29578">A</text>
<circle cx="462" cy="146" r="8" fill="#006d77"/><text class="dot" x="448" y="142" text-anchor="end" fill="#006d77">P</text>
<circle cx="630" cy="266" r="8" fill="#7b6cae"/><text class="dot" x="646" y="270" fill="#7b6cae">N</text>
<text class="note" x="486" y="184">pull closer</text>
<text class="desc" x="600" y="232">push past margin</text>
<text class="desc" x="520" y="338" text-anchor="middle">anchor nearer its positive</text>
<text class="desc" x="520" y="356" text-anchor="middle">than its negative — by a margin</text>

<!-- ===== 3 · ARCFACE ===== -->
<rect x="704" y="20" width="316" height="360" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="862" y="56" text-anchor="middle">ArcFace</text>
<text class="desc"  x="862" y="76" text-anchor="middle">separate classes by angle</text>
<circle cx="862" cy="208" r="82" fill="#eef5f2" stroke="#cdd4d6" stroke-width="1.5"/>
<circle cx="862" cy="208" r="3.5" fill="#60626a"/>
<!-- angular margin wedge at the bottom -->
<path d="M862 208 L812 272 A82 82 0 0 0 912 272 Z" fill="#e29578" fill-opacity="0.22" stroke="#e29578" stroke-width="1.6"/>
<!-- class 1 dots (left arc) -->
<g fill="#006d77"><circle cx="788" cy="196" r="7"/><circle cx="796" cy="222" r="7"/><circle cx="812" cy="244" r="7"/></g>
<!-- class 2 dots (right arc) -->
<g fill="#7b6cae"><circle cx="936" cy="196" r="7"/><circle cx="928" cy="222" r="7"/><circle cx="912" cy="244" r="7"/></g>
<text class="note" x="862" y="320" text-anchor="middle">angular margin</text>
<text class="desc" x="862" y="356" text-anchor="middle">crisp wedge between identities</text>
</svg>
