<svg viewBox="0 0 1040 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 13.5px; fill: #60626a; }
    .vlab  { font-size: 13px; font-weight: 800; fill: #006d77; }
    .dlab  { font-size: 15px; font-weight: 800; fill: #e29578; }
  </style>
</defs>

<!-- ===== LEFT · EUCLIDEAN ===== -->
<rect x="20" y="20" width="480" height="340" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="260" y="58" text-anchor="middle">Euclidean distance</text>

<!-- axes -->
<g stroke="#cdd4d6" stroke-width="1.5"><line x1="120" y1="300" x2="430" y2="300"/><line x1="120" y1="300" x2="120" y2="90"/></g>
<!-- vector a and collinear a' (same direction) -->
<line x1="120" y1="300" x2="300" y2="150" stroke="#006d77" stroke-width="2.5"/>
<line x1="300" y1="150" x2="396" y2="70" stroke="#006d77" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.7"/>
<circle cx="300" cy="150" r="6.5" fill="#006d77"/>
<circle cx="396" cy="70" r="6.5" fill="#006d77"/>
<text class="vlab" x="288" y="142" text-anchor="end">a</text>
<text class="vlab" x="408" y="66">a′</text>
<!-- the euclidean gap -->
<line x1="300" y1="150" x2="396" y2="70" stroke="#e29578" stroke-width="3.5"/>
<text class="dlab" x="360" y="100">d</text>
<text class="desc" x="260" y="328" text-anchor="middle">Same direction, different length —</text>
<text class="desc" x="260" y="346" text-anchor="middle">Euclidean still calls them far apart.</text>

<!-- ===== RIGHT · COSINE ===== -->
<rect x="540" y="20" width="480" height="340" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="780" y="58" text-anchor="middle">Cosine distance</text>

<g stroke="#cdd4d6" stroke-width="1.5"><line x1="640" y1="300" x2="950" y2="300"/><line x1="640" y1="300" x2="640" y2="90"/></g>
<!-- ray a + collinear a' -->
<line x1="640" y1="300" x2="820" y2="150" stroke="#006d77" stroke-width="2.5"/>
<line x1="820" y1="150" x2="893" y2="89" stroke="#006d77" stroke-width="2.5" stroke-dasharray="5 4" opacity="0.7"/>
<circle cx="820" cy="150" r="6.5" fill="#006d77"/><circle cx="893" cy="89" r="6.5" fill="#006d77"/>
<text class="vlab" x="808" y="142" text-anchor="end">a</text>
<text class="vlab" x="905" y="85">a′</text>
<!-- ray b -->
<line x1="640" y1="300" x2="900" y2="250" stroke="#7b6cae" stroke-width="2.5"/>
<circle cx="900" cy="250" r="6.5" fill="#7b6cae"/>
<text x="912" y="252" font-size="13" font-weight="800" fill="#7b6cae">b</text>
<!-- angle arc -->
<path d="M708.7 286.8 A 70 70 0 0 0 693.8 255.2" stroke="#e29578" stroke-width="3" fill="none"/>
<text class="dlab" x="720" y="270">θ</text>
<text class="desc" x="780" y="328" text-anchor="middle">a and a′ share the same angle to b —</text>
<text class="desc" x="780" y="346" text-anchor="middle">cosine ignores length, only θ matters.</text>
</svg>
