<svg viewBox="0 0 1040 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <linearGradient id="space" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4f9f8"/><stop offset="100%" stop-color="#e7f0ee"/></linearGradient>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 19px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 13px; fill: #60626a; }
    .tag   { font-size: 13px; font-weight: 800; letter-spacing: 0.10em; fill: #e29578; }
    .sub   { font-size: 12px; font-weight: 700; fill: #60626a; }
  </style>
</defs>

<!-- ===== LEFT · high-dimensional embeddings ===== -->
<rect x="20" y="40" width="384" height="300" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<text class="title" x="212" y="76" text-anchor="middle">Hundreds of dimensions</text>
<text class="desc"  x="212" y="98" text-anchor="middle">each image is a long vector — impossible to draw</text>

<!-- stack of tagged barcode vectors -->
<g>
  <!-- row helper: colored tag dot + 10 heat cells -->
  <!-- row 1 (teal) -->
  <circle cx="60" cy="138" r="7" fill="#006d77"/>
  <g stroke="#fff" stroke-width="1.5"><rect x="82" y="126" width="26" height="24" fill="#0e7c86"/><rect x="108" y="126" width="26" height="24" fill="#9fd3d0"/><rect x="134" y="126" width="26" height="24" fill="#176074"/><rect x="160" y="126" width="26" height="24" fill="#cdeae8"/><rect x="186" y="126" width="26" height="24" fill="#2f97a0"/><rect x="212" y="126" width="26" height="24" fill="#bfe6e4"/><rect x="238" y="126" width="26" height="24" fill="#5fb0bb"/><rect x="264" y="126" width="26" height="24" fill="#0e7c86"/><rect x="290" y="126" width="26" height="24" fill="#9fd3d0"/><rect x="316" y="126" width="26" height="24" fill="#176074"/></g>
  <!-- row 2 (teal) -->
  <circle cx="60" cy="172" r="7" fill="#006d77"/>
  <g stroke="#fff" stroke-width="1.5"><rect x="82" y="160" width="26" height="24" fill="#176074"/><rect x="108" y="160" width="26" height="24" fill="#0e7c86"/><rect x="134" y="160" width="26" height="24" fill="#cdeae8"/><rect x="160" y="160" width="26" height="24" fill="#9fd3d0"/><rect x="186" y="160" width="26" height="24" fill="#bfe6e4"/><rect x="212" y="160" width="26" height="24" fill="#2f97a0"/><rect x="238" y="160" width="26" height="24" fill="#0e7c86"/><rect x="264" y="160" width="26" height="24" fill="#5fb0bb"/><rect x="290" y="160" width="26" height="24" fill="#176074"/><rect x="316" y="160" width="26" height="24" fill="#cdeae8"/></g>
  <!-- row 3 (gold) -->
  <circle cx="60" cy="206" r="7" fill="#c2ad5e"/>
  <g stroke="#fff" stroke-width="1.5"><rect x="82" y="194" width="26" height="24" fill="#e0d28a"/><rect x="108" y="194" width="26" height="24" fill="#9c8638"/><rect x="134" y="194" width="26" height="24" fill="#c2ad5e"/><rect x="160" y="194" width="26" height="24" fill="#e0d28a"/><rect x="186" y="194" width="26" height="24" fill="#9c8638"/><rect x="212" y="194" width="26" height="24" fill="#c2ad5e"/><rect x="238" y="194" width="26" height="24" fill="#e0d28a"/><rect x="264" y="194" width="26" height="24" fill="#9c8638"/><rect x="290" y="194" width="26" height="24" fill="#c2ad5e"/><rect x="316" y="194" width="26" height="24" fill="#e0d28a"/></g>
  <!-- row 4 (purple) -->
  <circle cx="60" cy="240" r="7" fill="#7b6cae"/>
  <g stroke="#fff" stroke-width="1.5"><rect x="82" y="228" width="26" height="24" fill="#a99ccf"/><rect x="108" y="228" width="26" height="24" fill="#6a5a9e"/><rect x="134" y="228" width="26" height="24" fill="#7b6cae"/><rect x="160" y="228" width="26" height="24" fill="#a99ccf"/><rect x="186" y="228" width="26" height="24" fill="#6a5a9e"/><rect x="212" y="228" width="26" height="24" fill="#7b6cae"/><rect x="238" y="228" width="26" height="24" fill="#a99ccf"/><rect x="264" y="228" width="26" height="24" fill="#6a5a9e"/><rect x="290" y="228" width="26" height="24" fill="#7b6cae"/><rect x="316" y="228" width="26" height="24" fill="#a99ccf"/></g>
  <!-- row 5 (teal) -->
  <circle cx="60" cy="274" r="7" fill="#006d77"/>
  <g stroke="#fff" stroke-width="1.5"><rect x="82" y="262" width="26" height="24" fill="#0e7c86"/><rect x="108" y="262" width="26" height="24" fill="#cdeae8"/><rect x="134" y="262" width="26" height="24" fill="#176074"/><rect x="160" y="262" width="26" height="24" fill="#5fb0bb"/><rect x="186" y="262" width="26" height="24" fill="#2f97a0"/><rect x="212" y="262" width="26" height="24" fill="#9fd3d0"/><rect x="238" y="262" width="26" height="24" fill="#bfe6e4"/><rect x="264" y="262" width="26" height="24" fill="#0e7c86"/><rect x="290" y="262" width="26" height="24" fill="#176074"/><rect x="316" y="262" width="26" height="24" fill="#5fb0bb"/></g>
</g>
<text class="desc" x="342" y="302" text-anchor="end">… × 512 columns</text>

<!-- ===== ARROW · UMAP / t-SNE ===== -->
<text class="tag" x="512" y="178" text-anchor="middle">UMAP / t-SNE</text>
<line x1="424" y1="196" x2="600" y2="196" stroke="#e29578" stroke-width="4" marker-end="url(#arrow)"/>
<text class="sub" x="512" y="220" text-anchor="middle">keep neighbours</text>
<text class="sub" x="512" y="236" text-anchor="middle">close together</text>

<!-- ===== RIGHT · 2D map ===== -->
<rect x="620" y="40" width="400" height="300" rx="18" fill="url(#space)" stroke="#cdd4d6" stroke-width="1.5"/>
<text class="title" x="820" y="76" text-anchor="middle">A 2-D map you can read</text>
<!-- teal cluster -->
<g fill="#006d77"><circle cx="710" cy="150" r="7"/><circle cx="730" cy="138" r="7"/><circle cx="748" cy="156" r="7"/><circle cx="722" cy="166" r="7"/><circle cx="744" cy="134" r="7"/></g>
<!-- gold cluster -->
<g fill="#c2ad5e"><circle cx="930" cy="150" r="7"/><circle cx="950" cy="140" r="7"/><circle cx="916" cy="162" r="7"/><circle cx="944" cy="166" r="7"/></g>
<!-- purple cluster -->
<g fill="#7b6cae"><circle cx="870" cy="270" r="7"/><circle cx="890" cy="258" r="7"/><circle cx="856" cy="282" r="7"/><circle cx="884" cy="286" r="7"/></g>
<text class="desc" x="820" y="320" text-anchor="middle">same individual → same cluster</text>
</svg>
