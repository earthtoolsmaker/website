<svg viewBox="0 0 1040 460" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bfe6e4"/><stop offset="100%" stop-color="#5fb0bb"/></linearGradient>
  <linearGradient id="troutg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9c8638"/><stop offset="55%" stop-color="#c2ad5e"/><stop offset="100%" stop-color="#e0d28a"/></linearGradient>
  <filter id="jitter"><feColorMatrix type="hueRotate" values="95"/></filter>
  <filter id="speckle" x="0" y="0" width="100%" height="100%"><feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="2" stitchTiles="stitch"/></filter>
  <style>
    .label { font-size: 14px; font-weight: 700; fill: #161616; }
    .tag   { font-size: 11px; font-weight: 700; letter-spacing: 0.1em; fill: #e29578; }
  </style>
  <!-- trout: olive-gold body, black spots, red cutthroat slash (faces right) -->
  <g id="trout">
    <path d="M-46 0 L-66 -17 C -57 -7 -57 7 -66 17 Z" fill="#8a7a3a"/>
    <path d="M-4 13 C 0 23 10 22 13 12 Z" fill="#9a8a44"/>
    <path d="M-26 12 C -23 19 -14 19 -14 11 Z" fill="#9a8a44"/>
    <path d="M50 0 C 46 -8 34 -14 18 -16 C 4 -17 -16 -16 -34 -11 C -40 -9 -44 -6 -46 -3 L-46 3 C -44 6 -40 9 -34 11 C -16 16 4 17 18 16 C 34 14 46 8 50 0 Z" fill="url(#troutg)"/>
    <path d="M20 7 C 24 17 33 16 35 8 Z" fill="#8a7a3a"/>
    <path d="M2 -15 C 8 -26 19 -24 25 -12 C 16 -16 9 -16 2 -15 Z" fill="#9a8a44"/>
    <path d="M-30 -11 C -34 -17 -40 -16 -42 -12 C -38 -13 -33 -13 -30 -11 Z" fill="#9a8a44"/>
    <g fill="#2a2620"><circle cx="-32" cy="-4" r="1.7"/><circle cx="-24" cy="3" r="1.6"/><circle cx="-16" cy="-6" r="1.7"/><circle cx="-9" cy="4" r="1.5"/><circle cx="-2" cy="-7" r="1.6"/><circle cx="3" cy="6" r="1.4"/><circle cx="-20" cy="-1" r="1.4"/><circle cx="-27" cy="6" r="1.3"/><circle cx="-11" cy="-1" r="1.3"/><circle cx="7" cy="-4" r="1.4"/><circle cx="13" cy="3" r="1.3"/><circle cx="-6" cy="-2" r="1.2"/></g>
    <path d="M24 8 q 8 2 14 1" stroke="#d6452f" stroke-width="2.4" fill="none" stroke-linecap="round"/>
    <path d="M30 -10 C 26 -3 26 4 30 10" stroke="#8a7a3a" stroke-width="1.4" fill="none" opacity="0.7"/>
    <circle cx="39" cy="-3" r="3.2" fill="#2a2320"/><circle cx="40.1" cy="-4.1" r="1" fill="#fff"/>
  </g>

  <clipPath id="c1"><rect x="20"  y="20"  width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c2"><rect x="274" y="20"  width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c3"><rect x="528" y="20"  width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c4"><rect x="782" y="20"  width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c5"><rect x="20"  y="250" width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c6"><rect x="274" y="250" width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c7"><rect x="528" y="250" width="234" height="150" rx="12"/></clipPath>
  <clipPath id="c8"><rect x="782" y="250" width="234" height="150" rx="12"/></clipPath>
</defs>

<g stroke="#cdd4d6" stroke-width="1.5">
  <rect x="20"  y="20"  width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="274" y="20"  width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="528" y="20"  width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="782" y="20"  width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="20"  y="250" width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="274" y="250" width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="528" y="250" width="234" height="150" rx="12" fill="url(#water)"/>
  <rect x="782" y="250" width="234" height="150" rx="12" fill="url(#water)"/>
</g>

<!-- 1 · Original -->
<g clip-path="url(#c1)"><g transform="translate(137,95) scale(1.7)"><use href="#trout"/></g></g>
<text class="tag"   x="137" y="196" text-anchor="middle">REFERENCE</text>
<text class="label" x="137" y="214" text-anchor="middle">Original</text>

<!-- 2 · Scaling -->
<g clip-path="url(#c2)">
  <g transform="translate(391,95) scale(1.7)" opacity="0.18"><use href="#trout"/></g>
  <g transform="translate(391,95) scale(1.0)"><use href="#trout"/></g>
</g>
<text class="label" x="391" y="214" text-anchor="middle">Random scaling</text>

<!-- 3 · Rotation -->
<g clip-path="url(#c3)"><g transform="translate(645,95) scale(1.7) rotate(-22)"><use href="#trout"/></g></g>
<text class="label" x="645" y="214" text-anchor="middle">Random rotation</text>

<!-- 4 · Mosaic -->
<g clip-path="url(#c4)">
  <g transform="translate(840,57)  scale(0.8) rotate(12)"><use href="#trout"/></g>
  <g transform="translate(958,57)  scale(0.8,-0.8)"><use href="#trout"/></g>
  <g transform="translate(840,133) scale(-0.8,0.8) rotate(8)"><use href="#trout"/></g>
  <g transform="translate(958,133) scale(0.8) rotate(-14)"><use href="#trout"/></g>
</g>
<text class="label" x="899" y="214" text-anchor="middle">Mosaic</text>

<!-- 5 · Flipping -->
<g clip-path="url(#c5)"><g transform="translate(137,325) scale(-1.7,1.7)"><use href="#trout"/></g></g>
<text class="label" x="137" y="444" text-anchor="middle">Flipping</text>

<!-- 6 · Color jittering -->
<g clip-path="url(#c6)"><g transform="translate(391,325) scale(1.7)" filter="url(#jitter)"><use href="#trout"/></g></g>
<text class="label" x="391" y="444" text-anchor="middle">Color jittering</text>

<!-- 7 · Cropping (zoomed) -->
<g clip-path="url(#c7)"><g transform="translate(600,325) scale(3.1)"><use href="#trout"/></g></g>
<text class="label" x="645" y="444" text-anchor="middle">Cropping</text>

<!-- 8 · Gaussian noise -->
<g clip-path="url(#c8)">
  <g transform="translate(899,325) scale(1.7)"><use href="#trout"/></g>
  <rect x="782" y="250" width="234" height="150" filter="url(#speckle)" opacity="0.4"/>
</g>
<text class="label" x="899" y="444" text-anchor="middle">Gaussian noise</text>
</svg>
