<svg viewBox="0 0 760 400" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <style>
    .axis-title { font-size: 14px; font-weight: 700; fill: #60626a; }
    .tick       { font-size: 12px; fill: #80838b; }
    .note       { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 14px; font-style: italic; fill: #006d77; }
    .zone-label { font-size: 12px; font-weight: 700; letter-spacing: 0.04em; fill: #c4664a; }
    .dot        { animation: pulse 2.6s ease-in-out infinite; }
    .d2{animation-delay:-.4s}.d3{animation-delay:-.8s}.d4{animation-delay:-1.2s}.d5{animation-delay:-1.6s}.d6{animation-delay:-2s}
    @keyframes pulse { 0%,100%{r:5} 50%{r:6.5} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
</defs>

<!-- "impractical at scale" zone: corpus >= 10K -->
<rect x="598.4" y="44" width="125.6" height="286" fill="#e29578" opacity="0.09"/>
<line x1="598.4" y1="44" x2="598.4" y2="330" stroke="#e29578" stroke-width="1.5" stroke-dasharray="4 5" opacity="0.8"/>
<text class="zone-label" x="661" y="62" text-anchor="middle">impractical</text>
<text class="zone-label" x="661" y="78" text-anchor="middle">at scale</text>

<!-- gridlines -->
<g stroke="#ede0d4" stroke-width="1">
  <line x1="221.6" y1="44" x2="221.6" y2="330"/>
  <line x1="347.2" y1="44" x2="347.2" y2="330"/>
  <line x1="472.8" y1="44" x2="472.8" y2="330"/>
  <line x1="96" y1="268" x2="724" y2="268"/>
  <line x1="96" y1="214" x2="724" y2="214"/>
  <line x1="96" y1="160" x2="724" y2="160"/>
  <line x1="96" y1="106" x2="724" y2="106"/>
</g>

<!-- axes -->
<g stroke="#c9bdb0" stroke-width="1.5">
  <line x1="96" y1="44" x2="96" y2="330"/>
  <line x1="96" y1="330" x2="724" y2="330"/>
</g>

<!-- linear-scaling line (straight on log-log axes) -->
<polyline points="96,322 221.6,268 347.2,214 472.8,160 598.4,106 724,52"
  fill="none" stroke="#006d77" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

<!-- data points -->
<g fill="#006d77" stroke="#fbf6f6" stroke-width="2">
  <circle class="dot"    cx="96"    cy="322" r="5"/>
  <circle class="dot d2" cx="221.6" cy="268" r="5"/>
  <circle class="dot d3" cx="347.2" cy="214" r="5"/>
  <circle class="dot d4" cx="472.8" cy="160" r="5"/>
  <circle class="dot d5" cx="598.4" cy="106" r="5"/>
  <circle class="dot d6" cx="724"   cy="52"  r="5"/>
</g>

<!-- slope note -->
<text class="note" x="300" y="150" text-anchor="middle">10&#215; the corpus</text>
<text class="note" x="300" y="168" text-anchor="middle">= 10&#215; the time</text>

<!-- y ticks (time) -->
<g class="tick" text-anchor="end">
  <text x="86" y="326">20 ms</text>
  <text x="86" y="272">200 ms</text>
  <text x="86" y="218">2 s</text>
  <text x="86" y="164">20 s</text>
  <text x="86" y="110">3 m 20 s</text>
  <text x="86" y="56">33 m 20 s</text>
</g>

<!-- x ticks (corpus size) -->
<g class="tick" text-anchor="middle">
  <text x="96"    y="350">1</text>
  <text x="221.6" y="350">10</text>
  <text x="347.2" y="350">100</text>
  <text x="472.8" y="350">1K</text>
  <text x="598.4" y="350">10K</text>
  <text x="724"   y="350">100K</text>
</g>

<!-- axis titles -->
<text class="axis-title" x="410" y="384" text-anchor="middle">Known individuals in the corpus</text>
<text class="axis-title" x="24" y="187" text-anchor="middle" transform="rotate(-90 24 187)">Time to identify one image</text>
</svg>
