<svg viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <style>
    .title  { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 19px; font-weight: 600; fill: #161616; }
    .axis    { font-size: 12px; fill: #80838b; }
  </style>
  <g id="panel">
    <!-- marginal distribution of the important parameter (green, along the top) -->
    <path d="M0 0 C 35 0 48 -34 70 -34 C 92 -34 105 0 140 0 Z" fill="#bfe3cb" stroke="#4caf7d" stroke-width="2"/>
    <!-- marginal distribution of the unimportant parameter (amber, down the left) -->
    <path d="M0 0 C 0 35 -34 48 -34 70 C -34 92 0 105 0 140 Z" fill="#f6e0a8" stroke="#e0a93a" stroke-width="2"/>
    <rect x="0" y="0" width="140" height="140" fill="#ffffff" stroke="#2a2620" stroke-width="2"/>
  </g>
</defs>

<!-- ===== GRID (box top-left at 110,60) ===== -->
<use href="#panel" x="110" y="60"/>
<g stroke="#c9bdb0" stroke-width="1">
  <line x1="145" y1="60" x2="145" y2="200"/>
  <line x1="180" y1="60" x2="180" y2="200"/>
  <line x1="215" y1="60" x2="215" y2="200"/>
</g>
<g fill="#2a2620">
  <circle cx="145" cy="95" r="5"/><circle cx="180" cy="95" r="5"/><circle cx="215" cy="95" r="5"/>
  <circle cx="145" cy="130" r="5"/><circle cx="180" cy="130" r="5"/><circle cx="215" cy="130" r="5"/>
  <circle cx="145" cy="165" r="5"/><circle cx="180" cy="165" r="5"/><circle cx="215" cy="165" r="5"/>
</g>
<text class="axis" x="180" y="224" text-anchor="middle">Important parameter</text>
<text class="axis" x="66" y="130" text-anchor="middle" transform="rotate(-90 66 130)">Unimportant parameter</text>
<text class="title" x="180" y="254" text-anchor="middle">Grid layout</text>

<!-- ===== RANDOM (box top-left at 430,60) ===== -->
<use href="#panel" x="430" y="60"/>
<g stroke="#c9bdb0" stroke-width="1">
  <line x1="442" y1="60" x2="442" y2="200"/><line x1="456" y1="60" x2="456" y2="200"/>
  <line x1="473" y1="60" x2="473" y2="200"/><line x1="488" y1="60" x2="488" y2="200"/>
  <line x1="505" y1="60" x2="505" y2="200"/><line x1="521" y1="60" x2="521" y2="200"/>
  <line x1="538" y1="60" x2="538" y2="200"/><line x1="552" y1="60" x2="552" y2="200"/>
  <line x1="565" y1="60" x2="565" y2="200"/>
</g>
<g fill="#2a2620">
  <circle cx="442" cy="150" r="5"/><circle cx="456" cy="100" r="5"/><circle cx="473" cy="175" r="5"/>
  <circle cx="488" cy="120" r="5"/><circle cx="505" cy="90" r="5"/><circle cx="521" cy="160" r="5"/>
  <circle cx="538" cy="110" r="5"/><circle cx="552" cy="185" r="5"/><circle cx="565" cy="135" r="5"/>
</g>
<text class="axis" x="500" y="224" text-anchor="middle">Important parameter</text>
<text class="axis" x="386" y="130" text-anchor="middle" transform="rotate(-90 386 130)">Unimportant parameter</text>
<text class="title" x="500" y="254" text-anchor="middle">Random layout</text>
</svg>
