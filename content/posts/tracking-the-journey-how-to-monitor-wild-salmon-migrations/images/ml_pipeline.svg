<svg viewBox="0 0 1040 310" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bfe6e4"/><stop offset="100%" stop-color="#5fb0bb"/></linearGradient>
  <linearGradient id="salmon" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#ec9264"/><stop offset="100%" stop-color="#d2643a"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 22px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 13.5px; fill: #60626a; }
    .step  { font-size: 12px; font-weight: 700; letter-spacing: 0.14em; fill: #e29578; }
    .chip  { font-size: 10px; font-weight: 700; fill: #fff; }
    .row   { font-size: 12px; font-weight: 700; fill: #eafaf5; }
    .swim  { animation: swim 3.4s ease-in-out infinite; }
    .s2{animation-delay:-1.2s}
    @keyframes swim { 0%,100%{transform:translateX(-3px)} 50%{transform:translateX(3px)} }
    @media (prefers-reduced-motion: reduce){ *{animation:none!important} }
  </style>
  <g id="fish">
    <path d="M-22 0 C -14 -9 6 -10 18 -6 C 24 -4 27 -1 28 0 C 27 1 24 4 18 6 C 6 10 -14 9 -22 0 Z" fill="url(#salmon)"/>
    <path d="M-22 0 L-33 -8 L-33 8 Z" fill="#c85a2a"/>
    <circle cx="20" cy="-1.5" r="1.7" fill="#3a2018"/>
  </g>
</defs>

<!-- arrows between cards -->
<g stroke="#e29578" stroke-width="3" fill="none" stroke-linecap="round">
  <line x1="324" y1="114" x2="376" y2="114" marker-end="url(#arrow)"/>
  <line x1="664" y1="114" x2="716" y2="114" marker-end="url(#arrow)"/>
</g>

<!-- ===== 1 · DETECT ===== -->
<rect x="40" y="24" width="280" height="180" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<rect x="64" y="40" width="232" height="148" rx="10" fill="url(#water)"/>
<g transform="translate(150,92)"><g class="swim"><use href="#fish"/></g></g>
<g transform="translate(215,150)"><g class="swim s2"><use href="#fish"/></g></g>
<rect x="124" y="74" width="54" height="38" fill="none" stroke="#3fd07a" stroke-width="2.5"/>
<rect x="189" y="132" width="54" height="38" fill="none" stroke="#3fd07a" stroke-width="2.5"/>
<g><rect x="120" y="60" width="74" height="15" rx="7.5" fill="#0a7d86"/><text class="chip" x="157" y="71" text-anchor="middle">Sockeye 0.94</text></g>
<text class="step"  x="180" y="232" text-anchor="middle">01</text>
<text class="title" x="180" y="258" text-anchor="middle">Detect</text>
<text class="desc"  x="180" y="282" text-anchor="middle">Boxes + species, per frame</text>

<!-- ===== 2 · TRACK ===== -->
<rect x="380" y="24" width="280" height="180" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<rect x="404" y="40" width="232" height="148" rx="10" fill="url(#water)"/>
<g stroke="#eafaf5" stroke-width="1.6" stroke-dasharray="3 4" fill="none" opacity="0.7" stroke-linecap="round">
  <line x1="430" y1="92" x2="486" y2="92"/><line x1="430" y1="150" x2="551" y2="150"/>
</g>
<g transform="translate(490,92)"><g class="swim"><use href="#fish"/></g></g>
<g transform="translate(555,150)"><g class="swim s2"><use href="#fish"/></g></g>
<rect x="464" y="74" width="54" height="38" fill="none" stroke="#3fd07a" stroke-width="2.5"/>
<rect x="529" y="132" width="54" height="38" fill="none" stroke="#3fd07a" stroke-width="2.5"/>
<g><rect x="500" y="60" width="34" height="15" rx="4" fill="#15463f"/><text class="chip" x="517" y="71" text-anchor="middle">ID 2</text></g>
<g><rect x="565" y="118" width="34" height="15" rx="4" fill="#15463f"/><text class="chip" x="582" y="129" text-anchor="middle">ID 3</text></g>
<text class="step"  x="520" y="232" text-anchor="middle">02</text>
<text class="title" x="520" y="258" text-anchor="middle">Track</text>
<text class="desc"  x="520" y="282" text-anchor="middle">Persistent IDs across frames</text>

<!-- ===== 3 · COUNT ===== -->
<rect x="720" y="24" width="280" height="180" rx="18" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<rect x="760" y="48" width="200" height="132" rx="10" fill="#0e3a4a"/>
<text x="776" y="72" font-size="10" font-weight="700" letter-spacing="0.1em" fill="#83c5be">SEASON COUNT</text>
<g>
  <text class="row" x="776" y="98">Sockeye</text><text class="row" x="944" y="98" text-anchor="end">108</text>
  <line x1="776" y1="108" x2="944" y2="108" stroke="#1c5a6b" stroke-width="1"/>
  <text class="row" x="776" y="128">Coho</text><text class="row" x="944" y="128" text-anchor="end">12</text>
  <line x1="776" y1="138" x2="944" y2="138" stroke="#1c5a6b" stroke-width="1"/>
  <text class="row" x="776" y="158">Chinook</text><text class="row" x="944" y="158" text-anchor="end">3</text>
</g>
<text class="step"  x="860" y="232" text-anchor="middle">03</text>
<text class="title" x="860" y="258" text-anchor="middle">Count</text>
<text class="desc"  x="860" y="282" text-anchor="middle">Tally the run, per species</text>
</svg>
