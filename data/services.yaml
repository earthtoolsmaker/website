services:
  - title: "Data pipelines"
    description: "Terabytes of audio, video, and sensor data turned into usable signals."

  - title: "Custom ML models"
    description: "Species ID, behavior detection, environmental monitoring — trained on your data."

  - title: "Apps & deployment"
    description: "Web apps and dashboards your team actually uses, running on anything from edge devices to the cloud."

  - title: "Open source by default"
    description: "Transparent, reproducible, and yours to keep — no vendor lock-in."

