<svg viewBox="0 0 1500 1050" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f3"/><stop offset="100%" stop-color="#f1e9e1"/></linearGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e7f1ef" stop-opacity="0.95"/><stop offset="70%" stop-color="#e7f1ef" stop-opacity="0.45"/><stop offset="100%" stop-color="#e7f1ef" stop-opacity="0"/></radialGradient>
  <radialGradient id="sealcoat" cx="42%" cy="32%" r="74%"><stop offset="0%" stop-color="#919ba6"/><stop offset="68%" stop-color="#717b86"/><stop offset="100%" stop-color="#5b646e"/></radialGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="18" flood-color="#1c2b28" flood-opacity="0.13"/></filter>
  <style>
    .eyebrow { font-size: 28px; font-weight: 800; letter-spacing: 0.26em; fill: #e29578; }
    .h1      { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 110px; font-weight: 600; fill: #161616; }
    .sub     { font-size: 34px; fill: #60626a; }
  </style>
  <!-- seal face symbol -->
  <g id="sealface">
    <path d="M0 -120 Q-96 -116 -110 -28 Q-118 44 -66 84 Q-34 108 0 112 Q34 108 66 84 Q118 44 110 -28 Q96 -116 0 -120 Z" fill="url(#sealcoat)"/>
    <ellipse cx="0" cy="62" rx="54" ry="44" fill="#aeb6bd"/>
    <ellipse cx="0" cy="40" rx="38" ry="30" fill="#c2c9cf" opacity=".55"/>
    <g fill="#3d454e" opacity=".8">
      <circle cx="-66" cy="-58" r="6"/><circle cx="-30" cy="-78" r="5"/><circle cx="14" cy="-82" r="6"/><circle cx="52" cy="-66" r="5"/><circle cx="78" cy="-34" r="6"/>
      <circle cx="-84" cy="-20" r="5"/><circle cx="84" cy="-12" r="5"/><circle cx="-78" cy="18" r="5"/><circle cx="80" cy="22" r="5"/>
      <circle cx="-50" cy="-40" r="4"/><circle cx="40" cy="-40" r="4"/><circle cx="-20" cy="-54" r="3.5"/><circle cx="-92" cy="6" r="4"/><circle cx="92" cy="4" r="4"/>
      <circle cx="-58" cy="40" r="4"/><circle cx="60" cy="42" r="4"/>
    </g>
    <ellipse cx="-40" cy="-8" rx="20" ry="22" fill="#15110d"/><ellipse cx="40" cy="-8" rx="20" ry="22" fill="#15110d"/>
    <circle cx="-34" cy="-16" r="5.5" fill="#fff" opacity=".9"/><circle cx="46" cy="-16" r="5.5" fill="#fff" opacity=".9"/>
    <circle cx="-44" cy="0" r="3" fill="#fff" opacity=".4"/><circle cx="36" cy="0" r="3" fill="#fff" opacity=".4"/>
    <path d="M0 44 Q-16 50 -12 64 Q-6 74 0 70 Q6 74 12 64 Q16 50 0 44 Z" fill="#2a2320"/>
    <path d="M0 70 V80 M0 80 Q-22 92 -40 84 M0 80 Q22 92 40 84" fill="none" stroke="#3d3833" stroke-width="2.6" stroke-linecap="round"/>
    <g fill="#3d3833"><circle cx="-26" cy="66" r="1.6"/><circle cx="-34" cy="72" r="1.6"/><circle cx="-22" cy="74" r="1.6"/><circle cx="26" cy="66" r="1.6"/><circle cx="34" cy="72" r="1.6"/><circle cx="22" cy="74" r="1.6"/></g>
    <g stroke="#eae5dd" stroke-width="2" opacity=".85" stroke-linecap="round" fill="none">
      <path d="M-30 70 Q-78 64 -116 70"/><path d="M-30 76 Q-76 80 -112 92"/><path d="M-28 82 Q-70 94 -100 112"/>
      <path d="M30 70 Q78 64 116 70"/><path d="M30 76 Q76 80 112 92"/><path d="M28 82 Q70 94 100 112"/>
    </g>
  </g>
</defs>

<rect x="0" y="0" width="1500" height="1050" fill="url(#bg)"/>

<!-- embedding space halo + soft boundary -->
<ellipse cx="1150" cy="690" rx="430" ry="370" fill="url(#halo)"/>
<ellipse cx="1150" cy="690" rx="320" ry="290" fill="none" stroke="#bcd2ce" stroke-width="2" stroke-dasharray="3 10" stroke-linecap="round" opacity="0.8"/>

<!-- header -->
<text class="eyebrow" x="120" y="156">COMPUTER VISION · DATA PREP</text>
<text class="h1"  x="116" y="276">Preparing Data</text>
<text class="sub" x="120" y="334">From a raw photo to a clean, comparable image</text>

<!-- seal face (the subject) -->
<g filter="url(#soft)"><circle cx="340" cy="720" r="210" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g>
<g transform="translate(340,726) scale(1.55)"><use href="#sealface"/></g>

<!-- dissolve: flowing arc of dots from face into the space -->
<g>
  <circle cx="560" cy="712" r="7" fill="#6f7984"/><circle cx="586" cy="690" r="7" fill="#7a838d"/>
  <circle cx="616" cy="716" r="6" fill="#8d97a2"/><circle cx="648" cy="688" r="7" fill="#9aa3ad"/>
  <circle cx="684" cy="704" r="6" fill="#aeb6bd"/><circle cx="720" cy="676" r="7" fill="#bcc3c9"/>
  <circle cx="760" cy="700" r="6" fill="#c9ccc4"/><circle cx="802" cy="664" r="7" fill="#9fb9b5"/>
  <circle cx="844" cy="688" r="6" fill="#8bb2ad"/><circle cx="888" cy="652" r="6" fill="#7fb0ac"/>
</g>

<!-- normalized chips inside the embedding space -->
<g filter="url(#soft)"><rect x="980" y="520" width="150" height="150" rx="18" fill="#e7f1ef" stroke="#bcd2ce" stroke-width="2"/></g>
<g transform="translate(1055,602) scale(0.5)"><use href="#sealface"/></g>
<g filter="url(#soft)" transform="rotate(-6 1290 600)"><rect x="1215" y="525" width="150" height="150" rx="18" fill="#e7f1ef" stroke="#bcd2ce" stroke-width="2"/></g>
<g transform="translate(1290,605) rotate(-6) scale(0.5)"><use href="#sealface"/></g>
<g filter="url(#soft)"><rect x="1090" y="730" width="150" height="150" rx="18" fill="#e7f1ef" stroke="#bcd2ce" stroke-width="2"/></g>
<g transform="translate(1165,812) scale(0.5)"><use href="#sealface"/></g>

<!-- query connections (nearest-neighbour retrieval feel) -->
<g stroke="#e29578" stroke-width="2.4" stroke-dasharray="7 5">
  <line x1="1150" y1="690" x2="1055" y2="600"/><line x1="1150" y1="690" x2="1290" y2="600"/><line x1="1150" y1="690" x2="1165" y2="805"/>
</g>
<circle cx="1150" cy="690" r="15" fill="#e29578"/>
</svg>
