<svg viewBox="0 0 1500 1050" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f3"/><stop offset="100%" stop-color="#f1e9e1"/></linearGradient>
  <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88c8b9"/><stop offset="100%" stop-color="#4f9e8e"/></linearGradient>
  <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cfe9e0"/><stop offset="100%" stop-color="#aedccf"/></linearGradient>
  <linearGradient id="smokeg" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#9aa4a7"/><stop offset="55%" stop-color="#bcc3c6"/><stop offset="100%" stop-color="#dde1e3"/></linearGradient>
  <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#eaf3f0"/><stop offset="100%" stop-color="#dcebe6"/></linearGradient>
  <filter id="softsmoke" x="-70%" y="-70%" width="240%" height="260%"><feGaussianBlur stdDeviation="2.4"/></filter>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#1c2b28" flood-opacity="0.12"/></filter>
  <style>
    .eyebrow { font-size: 28px; font-weight: 800; letter-spacing: 0.26em; fill: #e29578; }
    .h1      { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 110px; font-weight: 600; fill: #161616; }
    .sub     { font-size: 34px; fill: #60626a; }
    .pill    { font-size: 26px; font-weight: 700; fill: #fff; }
    .axis    { font-size: 28px; fill: #8a8276; letter-spacing: 0.22em; }
  </style>
  <!-- small flame -->
  <g id="flame">
    <path d="M-13 0 C -16 -14 -4 -18 -8 -33 C -1 -22 4 -26 3 -37 C 7 -23 14 -20 11 0 Z" fill="#e3602f"/>
    <path d="M-7 0 C -9 -9 -2 -13 -4 -22 C 0 -15 4 -18 3 -25 C 6 -16 9 -12 7 0 Z" fill="#f4a23c"/>
  </g>
  <!-- simple conifer tree (base at 0,0) -->
  <g id="tree">
    <rect x="-3" y="-8" width="6" height="14" rx="2" fill="#3a6b54"/>
    <path d="M0 -44 L16 -14 L-16 -14 Z" fill="#2f7d63"/>
    <path d="M0 -34 L13 -8 L-13 -8 Z" fill="#379a76"/>
    <path d="M0 -24 L11 -2 L-11 -2 Z" fill="#43b189"/>
  </g>
</defs>

<rect x="0" y="0" width="1500" height="1050" fill="url(#bg)"/>

<!-- header -->
<text class="eyebrow" x="120" y="156">WILDFIRE · TEMPORAL MODELS</text>
<text class="h1"  x="116" y="276">Smoke Is a Behavior</text>
<text class="sub" x="120" y="334">It grows and drifts across frames over time</text>

<!-- ===== three frames; same hillside, plume grows & drifts left -> right ===== -->
<!-- frame geometry: 360x360, y top = 470, gap 60, starting x=120 -->

<!-- FRAME 1 — faint wisp -->
<g transform="translate(120,470)">
  <g filter="url(#soft)"><rect x="0" y="0" width="360" height="360" rx="22" fill="url(#sky)" stroke="#bcd2ce" stroke-width="2"/></g>
  <clipPath id="f1"><rect x="0" y="0" width="360" height="360" rx="22"/></clipPath>
  <g clip-path="url(#f1)">
    <path d="M-10 286 C 100 232 250 240 372 286 L372 360 L-10 360 Z" fill="url(#hill2)"/>
    <path d="M-10 312 C 100 262 240 266 372 312 L372 360 L-10 360 Z" fill="url(#hill)"/>
    <!-- forest around the smoke -->
    <g transform="translate(50,300) scale(0.9)"><use href="#tree"/></g>
    <g transform="translate(96,288) scale(1.1)"><use href="#tree"/></g>
    <g transform="translate(240,290) scale(1.05)"><use href="#tree"/></g>
    <g transform="translate(300,302) scale(0.85)"><use href="#tree"/></g>
    <g filter="url(#softsmoke)" fill="url(#smokeg)" transform="translate(168,250)"><circle cx="0" cy="0" r="10"/><circle cx="-5" cy="-14" r="8"/></g>
    <g transform="translate(168,278) scale(0.7)"><use href="#flame"/></g>
  </g>
  <rect x="138" y="206" width="64" height="76" rx="5" fill="none" stroke="#e8232a" stroke-width="4"/>
</g>

<!-- FRAME 2 — plume thickening -->
<g transform="translate(570,470)">
  <g filter="url(#soft)"><rect x="0" y="0" width="360" height="360" rx="22" fill="url(#sky)" stroke="#bcd2ce" stroke-width="2"/></g>
  <clipPath id="f2"><rect x="0" y="0" width="360" height="360" rx="22"/></clipPath>
  <g clip-path="url(#f2)">
    <path d="M-10 286 C 100 232 250 240 372 286 L372 360 L-10 360 Z" fill="url(#hill2)"/>
    <path d="M-10 312 C 100 262 240 266 372 312 L372 360 L-10 360 Z" fill="url(#hill)"/>
    <!-- forest around the smoke -->
    <g transform="translate(50,300) scale(0.9)"><use href="#tree"/></g>
    <g transform="translate(96,288) scale(1.1)"><use href="#tree"/></g>
    <g transform="translate(240,290) scale(1.05)"><use href="#tree"/></g>
    <g transform="translate(300,302) scale(0.85)"><use href="#tree"/></g>
    <g filter="url(#softsmoke)" fill="url(#smokeg)" transform="translate(168,236)"><circle cx="0" cy="0" r="14"/><circle cx="-8" cy="-20" r="16"/><circle cx="6" cy="-40" r="14"/></g>
    <g transform="translate(168,278) scale(0.85)"><use href="#flame"/></g>
  </g>
  <rect x="120" y="176" width="96" height="106" rx="5" fill="none" stroke="#e8232a" stroke-width="4"/>
</g>

<!-- FRAME 3 — drifting plume, confirmed -->
<g transform="translate(1020,470)">
  <g filter="url(#soft)"><rect x="0" y="0" width="360" height="360" rx="22" fill="url(#sky)" stroke="#bcd2ce" stroke-width="2"/></g>
  <clipPath id="f3"><rect x="0" y="0" width="360" height="360" rx="22"/></clipPath>
  <g clip-path="url(#f3)">
    <path d="M-10 286 C 100 232 250 240 372 286 L372 360 L-10 360 Z" fill="url(#hill2)"/>
    <path d="M-10 312 C 100 262 240 266 372 312 L372 360 L-10 360 Z" fill="url(#hill)"/>
    <!-- forest around the smoke -->
    <g transform="translate(50,300) scale(0.9)"><use href="#tree"/></g>
    <g transform="translate(96,288) scale(1.1)"><use href="#tree"/></g>
    <g transform="translate(248,292) scale(1.05)"><use href="#tree"/></g>
    <g transform="translate(306,302) scale(0.85)"><use href="#tree"/></g>
    <g filter="url(#softsmoke)" fill="url(#smokeg)" transform="translate(168,224)"><circle cx="0" cy="0" r="16"/><circle cx="-10" cy="-22" r="20"/><circle cx="10" cy="-46" r="20"/><circle cx="34" cy="-70" r="17"/><circle cx="58" cy="-90" r="13"/></g>
    <g transform="translate(168,278) scale(0.95)"><use href="#flame"/></g>
  </g>
  <rect x="108" y="120" width="150" height="162" rx="5" fill="none" stroke="#e8232a" stroke-width="4"/>
  <g transform="translate(176,108)"><rect x="-86" y="-26" width="172" height="44" rx="22" fill="#e8232a"/><text class="pill" x="0" y="6" text-anchor="middle">smoke 0.94</text></g>
</g>

<!-- connector arrows between frames -->
<g stroke="#c9b8a8" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <path d="M488 650 L556 650 M540 638 L562 650 L540 662"/>
  <path d="M938 650 L1006 650 M990 638 L1012 650 L990 662"/>
</g>

<!-- time axis -->
<text class="axis" x="750" y="910" text-anchor="middle">TIME →</text>
</svg>
