<svg viewBox="0 0 1500 1050" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f3"/><stop offset="100%" stop-color="#f1e9e1"/></linearGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e7f1ef" stop-opacity="0.92"/><stop offset="70%" stop-color="#e7f1ef" stop-opacity="0.4"/><stop offset="100%" stop-color="#e7f1ef" stop-opacity="0"/></radialGradient>
  <radialGradient id="coat" cx="42%" cy="32%" r="74%"><stop offset="0%" stop-color="#919ba6"/><stop offset="68%" stop-color="#717b86"/><stop offset="100%" stop-color="#5b646e"/></radialGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="18" flood-color="#1c2b28" flood-opacity="0.13"/></filter>
  <style>
    .eyebrow { font-size: 28px; font-weight: 800; letter-spacing: 0.26em; fill: #e29578; }
    .h1      { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 110px; font-weight: 600; fill: #161616; }
    .sub     { font-size: 34px; fill: #60626a; }
  </style>
  <!-- complete spotted-seal face symbol -->
  <g id="seal">
    <path d="M0 -120 Q-96 -116 -110 -28 Q-118 44 -66 84 Q-34 108 0 112 Q34 108 66 84 Q118 44 110 -28 Q96 -116 0 -120 Z" fill="url(#coat)"/>
    <ellipse cx="0" cy="62" rx="54" ry="44" fill="#aeb6bd"/>
    <ellipse cx="0" cy="40" rx="38" ry="30" fill="#c2c9cf" opacity=".55"/>
    <g fill="#3d454e" opacity=".82">
      <circle cx="-66" cy="-58" r="6"/><circle cx="-30" cy="-78" r="5"/><circle cx="14" cy="-82" r="6"/><circle cx="52" cy="-66" r="5"/><circle cx="78" cy="-34" r="6"/>
      <circle cx="-84" cy="-20" r="5"/><circle cx="84" cy="-12" r="5"/><circle cx="-78" cy="18" r="5"/><circle cx="80" cy="22" r="5"/>
      <circle cx="-50" cy="-40" r="4"/><circle cx="40" cy="-40" r="4"/><circle cx="-20" cy="-54" r="3.5"/><circle cx="-92" cy="6" r="4"/><circle cx="92" cy="4" r="4"/>
      <circle cx="-58" cy="40" r="4"/><circle cx="60" cy="42" r="4"/>
    </g>
    <ellipse cx="-40" cy="-8" rx="20" ry="22" fill="#15110d"/><ellipse cx="40" cy="-8" rx="20" ry="22" fill="#15110d"/>
    <circle cx="-34" cy="-16" r="5.5" fill="#fff" opacity=".9"/><circle cx="46" cy="-16" r="5.5" fill="#fff" opacity=".9"/>
    <circle cx="-44" cy="0" r="3" fill="#fff" opacity=".4"/><circle cx="36" cy="0" r="3" fill="#fff" opacity=".4"/>
    <path d="M0 44 Q-16 50 -12 64 Q-6 74 0 70 Q6 74 12 64 Q16 50 0 44 Z" fill="#2a2320"/>
    <path d="M0 70 V80 M0 80 Q-22 92 -40 84 M0 80 Q22 92 40 84" fill="none" stroke="#3d3833" stroke-width="2.6" stroke-linecap="round"/>
    <g fill="#3d3833"><circle cx="-26" cy="66" r="1.6"/><circle cx="-34" cy="72" r="1.6"/><circle cx="-22" cy="74" r="1.6"/><circle cx="26" cy="66" r="1.6"/><circle cx="34" cy="72" r="1.6"/><circle cx="22" cy="74" r="1.6"/></g>
    <g stroke="#eae5dd" stroke-width="2" opacity=".85" stroke-linecap="round" fill="none">
      <path d="M-30 70 Q-78 64 -116 70"/><path d="M-30 76 Q-76 80 -112 92"/><path d="M-28 82 Q-70 94 -100 112"/>
      <path d="M30 70 Q78 64 116 70"/><path d="M30 76 Q76 80 112 92"/><path d="M28 82 Q70 94 100 112"/>
    </g>
  </g>
</defs>

<rect x="0" y="0" width="1500" height="1050" fill="url(#bg)"/>

<!-- embedding-space halo behind the second view -->
<ellipse cx="1140" cy="730" rx="400" ry="330" fill="url(#halo)"/>

<!-- header -->
<text class="eyebrow" x="120" y="156">COMPUTER VISION · IDENTIFICATION</text>
<text class="h1"  x="116" y="276">Feature Matching</text>
<text class="sub" x="120" y="334">Every spot becomes a keypoint — and lines up across photos</text>

<!-- hero seal face -->
<g filter="url(#soft)"><circle cx="370" cy="700" r="220" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g>
<g transform="translate(370,706) scale(1.62)"><use href="#seal"/></g>

<!-- green keypoints + constellation on the hero coat -->
<g stroke="#2bb673" stroke-width="2.4" opacity=".85">
  <line x1="250" y1="600" x2="370" y2="572"/><line x1="370" y1="572" x2="446" y2="632"/>
  <line x1="272" y1="730" x2="394" y2="762"/><line x1="446" y1="632" x2="484" y2="700"/>
</g>
<g fill="#2bb673">
  <circle cx="250" cy="600" r="8"/><circle cx="370" cy="572" r="8"/><circle cx="446" cy="632" r="8"/>
  <circle cx="272" cy="730" r="8"/><circle cx="394" cy="762" r="8"/><circle cx="484" cy="700" r="8"/>
</g>

<!-- coral match lines flying toward the second view -->
<g stroke="#e29578" stroke-width="3" stroke-dasharray="8 6">
  <line x1="484" y1="700" x2="1050" y2="690"/><line x1="446" y1="632" x2="1080" y2="760"/>
</g>

<!-- second (smaller) view inside the embedding space -->
<g filter="url(#soft)"><circle cx="1140" cy="730" r="160" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g>
<g transform="translate(1140,735) scale(1.16)"><use href="#seal"/></g>
<!-- matched keypoints on the second view -->
<g fill="#2bb673">
  <circle cx="1050" cy="690" r="7"/><circle cx="1080" cy="760" r="7"/><circle cx="1208" cy="680" r="7"/><circle cx="1216" cy="772" r="7"/>
</g>
<g stroke="#2bb673" stroke-width="1.8" opacity=".8"><line x1="1050" y1="690" x2="1208" y2="680"/><line x1="1080" y1="760" x2="1216" y2="772"/></g>
</svg>
