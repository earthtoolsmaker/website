<svg viewBox="0 0 1500 1050" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f3"/><stop offset="100%" stop-color="#f3ebe4"/></linearGradient>
  <radialGradient id="halo" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="#e8f1ef" stop-opacity="0.9"/><stop offset="100%" stop-color="#e8f1ef" stop-opacity="0"/></radialGradient>
  <filter id="soft" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#1c2b28" flood-opacity="0.12"/></filter>
  <style>
    .eyebrow { font-size: 27px; font-weight: 800; letter-spacing: 0.24em; fill: #e29578; }
    .h1      { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 104px; font-weight: 600; fill: #161616; }
    .sub     { font-size: 33px; fill: #60626a; }
  </style>
  <g id="bearface">
    <circle cx="-34" cy="-32" r="16" fill="#6e4a30"/><circle cx="34" cy="-32" r="16" fill="#6e4a30"/>
    <circle cx="-34" cy="-32" r="7.5" fill="#5a3c26"/><circle cx="34" cy="-32" r="7.5" fill="#5a3c26"/>
    <ellipse cx="0" cy="0" rx="42" ry="39" fill="#6e4a30"/>
    <ellipse cx="0" cy="19" rx="23" ry="19" fill="#8a6648"/>
    <circle cx="-17" cy="-6" r="4.5" fill="#221913"/><circle cx="17" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="11" rx="9" ry="6.5" fill="#2a1d15"/>
    <path d="M0 17 V29" stroke="#2a1d15" stroke-width="2"/>
  </g>
</defs>

<rect x="0" y="0" width="1500" height="1050" fill="url(#bg)"/>
<ellipse cx="1080" cy="690" rx="420" ry="360" fill="url(#halo)"/>

<!-- header -->
<text class="eyebrow" x="120" y="150">CONSERVATION · COMPUTER VISION</text>
<text class="h1"  x="116" y="262">Metric Learning</text>
<text class="sub" x="120" y="318">A visual guide to telling individual animals apart</text>

<!-- ===== hero: a face becoming points ===== -->
<!-- bear face -->
<g filter="url(#soft)"><circle cx="360" cy="700" r="208" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g>
<g transform="translate(360,706) scale(3.05)"><use href="#bearface"/></g>

<!-- dissolve: dots lifting off the face and drifting right -->
<g>
  <!-- close to face (brown, small) -->
  <circle cx="560" cy="630" r="6" fill="#8a6648"/><circle cx="582" cy="688" r="6" fill="#8a6648"/>
  <circle cx="600" cy="612" r="5" fill="#a07a52"/><circle cx="624" cy="664" r="6" fill="#a07a52"/>
  <circle cx="648" cy="624" r="5" fill="#b98e63"/><circle cx="672" cy="700" r="5" fill="#b98e63"/>
  <!-- mid drift (warm neutral) -->
  <circle cx="720" cy="596" r="7" fill="#e0b48f"/><circle cx="756" cy="668" r="7" fill="#e0b48f"/>
  <circle cx="792" cy="624" r="6" fill="#e29578"/><circle cx="828" cy="704" r="6" fill="#e29578"/>
  <circle cx="864" cy="588" r="7" fill="#dbb39a"/><circle cx="900" cy="652" r="6" fill="#dbb39a"/>
  <circle cx="948" cy="720" r="6" fill="#d9a441"/><circle cx="980" cy="600" r="6" fill="#7b6cae"/>
</g>

<!-- right: organised clusters (the embedding space) -->
<!-- constellation links -->
<g stroke="#9bb7b3" stroke-width="1.6" opacity="0.7">
  <line x1="1050" y1="556" x2="1086" y2="540"/><line x1="1086" y1="540" x2="1100" y2="576"/><line x1="1050" y1="556" x2="1066" y2="588"/>
  <line x1="1248" y1="712" x2="1280" y2="700"/><line x1="1280" y1="700" x2="1264" y2="734"/>
  <line x1="1132" y1="838" x2="1162" y2="824"/><line x1="1162" y1="824" x2="1150" y2="858"/>
</g>
<!-- teal cluster -->
<g fill="#0e7c86"><circle cx="1050" cy="556" r="11"/><circle cx="1086" cy="540" r="11"/><circle cx="1100" cy="576" r="11"/><circle cx="1066" cy="588" r="11"/><circle cx="1092" cy="606" r="11"/></g>
<!-- gold cluster -->
<g fill="#c2ad5e"><circle cx="1248" cy="712" r="11"/><circle cx="1280" cy="700" r="11"/><circle cx="1264" cy="734" r="11"/><circle cx="1232" cy="730" r="11"/></g>
<!-- purple cluster -->
<g fill="#7b6cae"><circle cx="1132" cy="838" r="11"/><circle cx="1162" cy="824" r="11"/><circle cx="1150" cy="858" r="11"/><circle cx="1118" cy="858" r="11"/></g>
<!-- query point with links to teal cluster -->
<g stroke="#e29578" stroke-width="2" stroke-dasharray="6 4">
  <line x1="1150" y1="660" x2="1092" y2="606"/><line x1="1150" y1="660" x2="1100" y2="576"/><line x1="1150" y1="660" x2="1066" y2="588"/>
</g>
<circle cx="1150" cy="660" r="13" fill="#e29578"/>
</svg>
