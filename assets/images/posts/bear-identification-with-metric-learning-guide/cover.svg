<svg viewBox="0 0 1500 1050" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#fff8f3"/><stop offset="100%" stop-color="#f1e9e1"/></linearGradient>
  <filter id="soft" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="9" stdDeviation="18" flood-color="#1c2b28" flood-opacity="0.13"/></filter>
  <style>
    .eyebrow { font-size: 28px; font-weight: 800; letter-spacing: 0.26em; fill: #e29578; }
    .h1      { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 110px; font-weight: 600; fill: #161616; }
    .sub     { font-size: 34px; fill: #60626a; }
    .qmark   { font-family: Newsreader, Georgia, serif; font-size: 230px; font-weight: 600; fill: #b8a48f; }
    .clbl    { font-size: 26px; fill: #60626a; }
  </style>

  <!-- ===== bear face individuals (subtly distinct) ===== -->
  <!-- baseline -->
  <g id="bear1">
    <circle cx="-34" cy="-32" r="16" fill="#6e4a30"/><circle cx="34" cy="-32" r="16" fill="#6e4a30"/>
    <circle cx="-34" cy="-32" r="7.5" fill="#5a3c26"/><circle cx="34" cy="-32" r="7.5" fill="#5a3c26"/>
    <ellipse cx="0" cy="0" rx="42" ry="39" fill="#6e4a30"/><ellipse cx="0" cy="19" rx="23" ry="19" fill="#8a6648"/>
    <circle cx="-17" cy="-6" r="4.5" fill="#221913"/><circle cx="17" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="11" rx="9" ry="6.5" fill="#2a1d15"/><path d="M0 17 V29" stroke="#2a1d15" stroke-width="2"/>
  </g>
  <!-- round, small ears -->
  <g id="bear2">
    <circle cx="-30" cy="-30" r="12" fill="#6e4a30"/><circle cx="30" cy="-30" r="12" fill="#6e4a30"/>
    <circle cx="-30" cy="-30" r="5.5" fill="#5a3c26"/><circle cx="30" cy="-30" r="5.5" fill="#5a3c26"/>
    <circle cx="0" cy="2" r="42" fill="#74502f"/><ellipse cx="0" cy="20" rx="17" ry="16" fill="#9a774f"/>
    <circle cx="-15" cy="-4" r="4.5" fill="#221913"/><circle cx="15" cy="-4" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="13" rx="7" ry="5.5" fill="#2a1d15"/><path d="M0 18 V28" stroke="#2a1d15" stroke-width="2"/>
  </g>
  <!-- long muzzle, big ears -->
  <g id="bear3">
    <circle cx="-40" cy="-30" r="18" fill="#5e3f28"/><circle cx="40" cy="-30" r="18" fill="#5e3f28"/>
    <circle cx="-40" cy="-30" r="8.5" fill="#4a3120"/><circle cx="40" cy="-30" r="8.5" fill="#4a3120"/>
    <ellipse cx="0" cy="0" rx="40" ry="40" fill="#5e3f28"/><ellipse cx="0" cy="24" rx="22" ry="22" fill="#7c5836"/>
    <circle cx="-20" cy="-6" r="4.5" fill="#221913"/><circle cx="20" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="16" rx="9" ry="7" fill="#2a1d15"/><path d="M0 23 V34" stroke="#2a1d15" stroke-width="2"/>
  </g>
  <!-- blonde, blaze -->
  <g id="bear4">
    <circle cx="-26" cy="-34" r="14" fill="#a9855f"/><circle cx="26" cy="-34" r="14" fill="#a9855f"/>
    <circle cx="-26" cy="-34" r="6.5" fill="#8a6648"/><circle cx="26" cy="-34" r="6.5" fill="#8a6648"/>
    <ellipse cx="0" cy="0" rx="41" ry="38" fill="#a9855f"/><ellipse cx="0" cy="19" rx="22" ry="18" fill="#c6a578"/>
    <path d="M0 -38 q4 18 0 30" stroke="#8a6648" stroke-width="4" fill="none" opacity=".6"/>
    <circle cx="-16" cy="-6" r="4.5" fill="#221913"/><circle cx="16" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="11" rx="8.5" ry="6" fill="#2a1d15"/><path d="M0 17 V28" stroke="#2a1d15" stroke-width="2"/>
  </g>
  <!-- dark, broad, scar -->
  <g id="bear5">
    <circle cx="-38" cy="-26" r="15" fill="#4a3120"/><circle cx="38" cy="-26" r="15" fill="#4a3120"/>
    <circle cx="-38" cy="-26" r="7" fill="#3a2718"/><circle cx="38" cy="-26" r="7" fill="#3a2718"/>
    <ellipse cx="0" cy="0" rx="46" ry="37" fill="#4a3120"/><ellipse cx="0" cy="18" rx="24" ry="17" fill="#69492e"/>
    <circle cx="-19" cy="-6" r="4.5" fill="#221913"/><circle cx="19" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="10" rx="9.5" ry="6.5" fill="#2a1d15"/><path d="M0 16 V27" stroke="#2a1d15" stroke-width="2"/>
    <path d="M-26 -18 l8 12" stroke="#8a6648" stroke-width="2.5" opacity=".7"/>
  </g>
</defs>

<rect x="0" y="0" width="1500" height="1050" fill="url(#bg)"/>

<!-- header -->
<text class="eyebrow" x="120" y="156">CONSERVATION · FACE RECOGNITION</text>
<text class="h1"  x="116" y="276">Who Is This Bear?</text>
<text class="sub" x="120" y="334">Match an unknown face to a catalog of known bears</text>

<!-- ===== query: an unknown face (?) ===== -->
<g filter="url(#soft)"><circle cx="330" cy="700" r="190" fill="#fbf6f6" stroke="#e29578" stroke-width="5" stroke-dasharray="14 12"/></g>
<text class="qmark" x="330" y="788" text-anchor="middle">?</text>

<!-- arrow query -> catalog -->
<g stroke="#c4b2a1" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <line x1="548" y1="700" x2="660" y2="700"/><path d="M642 680 L678 700 L642 720"/>
</g>

<!-- ===== catalog grid of known bears (one ringed as the match) ===== -->
<!-- row 1 -->
<g transform="translate(820,560)"><g filter="url(#soft)"><circle r="105" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g><g transform="scale(1.55)"><use href="#bear2"/></g></g>
<!-- MATCH (ringed teal, baseline-like = the query's true identity) -->
<g transform="translate(1075,540)"><g filter="url(#soft)"><circle r="115" fill="#fbf6f6" stroke="#0e7c86" stroke-width="8"/></g><g transform="scale(1.7)"><use href="#bear1"/></g>
  <g transform="translate(86,-86)"><circle r="26" fill="#0e7c86"/><path d="M-11 0 L-4 9 L12 -11" stroke="#fff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/></g>
</g>
<g transform="translate(1320,580)"><g filter="url(#soft)"><circle r="100" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g><g transform="scale(1.5)"><use href="#bear3"/></g></g>
<!-- row 2 -->
<g transform="translate(905,820)"><g filter="url(#soft)"><circle r="100" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g><g transform="scale(1.5)"><use href="#bear4"/></g></g>
<g transform="translate(1160,840)"><g filter="url(#soft)"><circle r="100" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g><g transform="scale(1.5)"><use href="#bear5"/></g></g>
<g transform="translate(1395,810)"><g filter="url(#soft)"><circle r="92" fill="#fbf6f6" stroke="#ede0d4" stroke-width="3"/></g><g transform="scale(1.38)"><use href="#bear2"/></g></g>
</svg>
