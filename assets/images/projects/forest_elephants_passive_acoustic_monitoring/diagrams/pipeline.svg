<svg viewBox="0 0 1062 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88c8b9"/><stop offset="100%" stop-color="#4f9e8e"/></linearGradient>
  <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cfe9e0"/><stop offset="100%" stop-color="#aedccf"/></linearGradient>
  <linearGradient id="mapg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a7d86"/><stop offset="100%" stop-color="#045058"/></linearGradient>
  <linearGradient id="spectro" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d7dbde"/><stop offset="100%" stop-color="#aab2b6"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .pill  { font-size: 12px; font-weight: 700; fill: #fff; }
    .wave  { animation: pulse 2.1s ease-in-out infinite; } .wave.w2 { animation-delay: -0.7s; } .wave.w3 { animation-delay: -1.4s; }
    .blink { animation: blink 1.4s steps(1,end) infinite; }
    .box   { animation: boxpulse 2.2s ease-in-out infinite; }
    .scan  { animation: sweep 3.2s ease-in-out infinite; }
    .ring  { transform-box: fill-box; transform-origin: 50% 50%; animation: ring 2.4s ease-out infinite; }
    .mic-on { animation: pulse 2s ease-in-out infinite; } .mic-on.b { animation-delay: -1s; }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.25} }
    @keyframes boxpulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes sweep { 0%{transform:translateX(0)} 50%{transform:translateX(108px)} 100%{transform:translateX(0)} }
    @keyframes ring { 0%{opacity:0.9; transform:scale(0.4)} 70%{opacity:0} 100%{opacity:0} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- ===== reusable elephant silhouette (faces right) ===== -->
  <g id="elephant" fill="#15463f">
    <ellipse cx="0" cy="0" rx="32" ry="22"/>
    <circle cx="27" cy="-4" r="16"/>
    <ellipse cx="17" cy="-6" rx="10" ry="12" fill="#1d5b51"/>
    <path d="M39 -10 C 51 -4 49 16 44 26 C 42 31 35 31 36 24 C 38 14 37 2 31 -3 Z"/>
    <path d="M41 10 C 46 16 48 21 45 22 C 42 20 38 15 37 11 Z" fill="#e8e2d5"/>
    <rect x="-26" y="15" width="10" height="22" rx="3"/>
    <rect x="-9" y="17" width="10" height="22" rx="3"/>
    <rect x="7" y="17" width="10" height="20" rx="3"/>
    <rect x="21" y="15" width="9" height="20" rx="3"/>
    <circle cx="31" cy="-6" r="1.9" fill="#cfe9e0"/>
  </g>
</defs>

<!-- ============ ARROWS ============ -->
<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
  <line x1="768" y1="134" x2="809" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- ============ CARD 1 — LISTEN (cx=142) ============ -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <clipPath id="c1"><rect x="-90" y="-84" width="180" height="168" rx="12"/></clipPath>
  <g clip-path="url(#c1)">
    <rect x="-90" y="-84" width="180" height="168" fill="#f3faf9"/>
    <path d="M-95 70 C -55 36 -10 40 18 36 C 50 31 74 44 96 70 Z" fill="url(#hill2)"/>
    <path d="M-90 78 C -50 44 -10 44 12 46 C 44 49 66 60 92 80 Z" fill="url(#hill)"/>
    <!-- tree -->
    <g transform="translate(60,18)"><rect x="-2" y="0" width="4" height="22" fill="#3a8576"/><circle cx="0" cy="-6" r="13" fill="#3a8576"/><circle cx="-8" cy="0" r="9" fill="#4f9e8e"/><circle cx="8" cy="-1" r="9" fill="#4f9e8e"/></g>
    <!-- elephant -->
    <g transform="translate(-44,22) scale(0.66)"><use href="#elephant"/></g>
    <!-- rumble waves toward the mic -->
    <g transform="translate(2,-2)" stroke="#e29578" stroke-width="3" fill="none" stroke-linecap="round">
      <path class="wave w1" d="M0 -8 A 12 12 0 0 1 0 8"/>
      <path class="wave w2" d="M9 -15 A 21 21 0 0 1 9 15"/>
      <path class="wave w3" d="M18 -22 A 30 30 0 0 1 18 22"/>
    </g>
    <!-- microphone on a stand -->
    <g transform="translate(60,2)">
      <rect x="-2" y="8" width="4" height="40" fill="#15463f"/>
      <rect x="-13" y="46" width="26" height="5" rx="2.5" fill="#15463f"/>
      <rect x="-8" y="-20" width="16" height="34" rx="8" fill="#006d77"/>
      <g stroke="#0a3f44" stroke-width="1.5"><path d="M-6 -13 H6"/><path d="M-6 -6 H6"/><path d="M-6 1 H6"/></g>
    </g>
  </g>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Listen</text>
<text class="desc"  x="142" y="338" text-anchor="middle">A mic catches a rumble</text>

<!-- ============ CARD 2 — RECORD (cx=401) ============ -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <!-- mic-grid map panel -->
  <rect x="-78" y="-66" width="156" height="116" rx="14" fill="url(#mapg)"/>
  <g fill="#bfe0d6" opacity="0.85">
    <circle cx="-54" cy="-44" r="4"/><circle cx="-27" cy="-44" r="4"/><circle cx="0" cy="-44" r="4"/><circle cx="27" cy="-44" r="4"/><circle cx="54" cy="-44" r="4"/>
    <circle cx="-54" cy="-16" r="4"/><circle cx="-27" cy="-16" r="4"/><circle cx="27" cy="-16" r="4"/><circle cx="54" cy="-16" r="4"/>
    <circle cx="-54" cy="12" r="4"/><circle cx="-27" cy="12" r="4"/><circle cx="0" cy="12" r="4"/><circle cx="27" cy="12" r="4"/><circle cx="54" cy="12" r="4"/>
  </g>
  <!-- a couple of "hot" mics picking up sound -->
  <circle class="mic-on" cx="0" cy="-16" r="5" fill="#e29578"/>
  <circle class="mic-on b" cx="-27" cy="12" r="5" fill="#e29578"/>
  <!-- REC + waveform strip -->
  <g transform="translate(0,36)">
    <circle class="blink" cx="-58" cy="0" r="4.5" fill="#e29578"/>
    <text x="-48" y="4" font-size="11" font-weight="700" fill="#cfe9e0" letter-spacing="0.1em">REC</text>
    <g stroke="#83c5be" stroke-width="2" stroke-linecap="round"><path d="M-18 0 V-1"/><path d="M-12 0 V-7"/><path d="M-6 0 V-12"/><path d="M0 0 V-5"/><path d="M6 0 V-14"/><path d="M12 0 V-6"/><path d="M18 0 V-10"/><path d="M24 0 V-3"/><path d="M30 0 V-8"/></g>
  </g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Record</text>
<text class="desc"  x="401" y="338" text-anchor="middle">50 mics record 24/7</text>

<!-- ============ CARD 3 — DETECT (cx=660) ============ -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <clipPath id="c3"><rect x="-78" y="-58" width="156" height="116" rx="12"/></clipPath>
  <!-- spectrogram tile -->
  <rect x="-78" y="-58" width="156" height="116" rx="12" fill="url(#spectro)"/>
  <g clip-path="url(#c3)">
    <g stroke="#8b9398" stroke-width="2">
      <path d="M-70 58 V-58" opacity="0.25"/><path d="M-60 58 V-58" opacity="0.5"/><path d="M-52 58 V-58" opacity="0.3"/><path d="M-42 58 V-58" opacity="0.6"/><path d="M-34 58 V-58" opacity="0.35"/><path d="M-24 58 V-58" opacity="0.55"/><path d="M-14 58 V-58" opacity="0.3"/><path d="M-4 58 V-58" opacity="0.5"/><path d="M6 58 V-58" opacity="0.35"/><path d="M16 58 V-58" opacity="0.6"/><path d="M26 58 V-58" opacity="0.3"/><path d="M36 58 V-58" opacity="0.5"/><path d="M46 58 V-58" opacity="0.35"/><path d="M56 58 V-58" opacity="0.55"/><path d="M66 58 V-58" opacity="0.3"/>
    </g>
    <!-- low-frequency rumble energy near the bottom -->
    <g fill="#5b6469" opacity="0.55"><ellipse cx="-30" cy="34" rx="20" ry="10"/><ellipse cx="22" cy="40" rx="24" ry="9"/></g>
    <!-- sweeping scan line -->
    <rect class="scan" x="-78" y="-58" width="3" height="116" fill="#e29578" opacity="0.7"/>
  </g>
  <!-- detection box + pill -->
  <rect class="box" x="-50" y="22" width="42" height="30" rx="3" fill="none" stroke="#e8232a" stroke-width="3"/>
  <g transform="translate(-29,12)"><rect x="-34" y="-11" width="68" height="18" rx="9" fill="#e8232a"/><text class="pill" x="0" y="3" text-anchor="middle">rumble 0.92</text></g>
  <!-- AI chip badge -->
  <g transform="translate(58,-44)">
    <rect x="-16" y="-13" width="32" height="26" rx="6" fill="#006d77"/>
    <circle cx="-6" cy="-3" r="2.6" fill="#bfe0d6"/><circle cx="6" cy="-3" r="2.6" fill="#bfe0d6"/><circle cx="0" cy="7" r="2.6" fill="#bfe0d6"/>
    <path d="M-6 -3 L0 7 L6 -3" stroke="#83c5be" stroke-width="1.8" fill="none"/>
  </g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Detect</text>
<text class="desc"  x="660" y="338" text-anchor="middle">AI spots each rumble</text>

<!-- ============ CARD 4 — LOCATE (cx=919) ============ -->
<rect x="813" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(919,128)">
  <rect x="-78" y="-66" width="156" height="116" rx="14" fill="url(#mapg)"/>
  <g fill="#bfe0d6" opacity="0.8">
    <circle cx="-54" cy="-44" r="4"/><circle cx="-27" cy="-44" r="4"/><circle cx="0" cy="-44" r="4"/><circle cx="27" cy="-44" r="4"/><circle cx="54" cy="-44" r="4"/>
    <circle cx="-54" cy="-16" r="4"/><circle cx="54" cy="-16" r="4"/>
    <circle cx="-54" cy="12" r="4"/><circle cx="-27" cy="12" r="4"/><circle cx="0" cy="12" r="4"/><circle cx="27" cy="12" r="4"/><circle cx="54" cy="12" r="4"/>
  </g>
  <!-- triangulation lines converging on the source -->
  <g stroke="#83c5be" stroke-width="1.6" opacity="0.7"><path d="M-27 -16 L0 -8"/><path d="M27 -16 L0 -8"/><path d="M0 12 L0 -8"/></g>
  <!-- pulsing ring + map pin at the located source -->
  <circle class="ring" cx="0" cy="-8" r="20" fill="none" stroke="#e29578" stroke-width="3"/>
  <g transform="translate(0,-10)">
    <path d="M0 6 C -8 -2 -8 -12 0 -16 C 8 -12 8 -2 0 6 Z" fill="#e29578"/>
    <circle cx="0" cy="-9" r="3.4" fill="#fbf6f6"/>
  </g>
</g>
<text class="step" x="919" y="280" text-anchor="middle">04</text>
<text class="title" x="919" y="312" text-anchor="middle">Locate</text>
<text class="desc"  x="919" y="338" text-anchor="middle">Pinpoints the source</text>
</svg>
