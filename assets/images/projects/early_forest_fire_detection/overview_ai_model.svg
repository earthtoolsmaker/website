<svg viewBox="0 0 804 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88c8b9"/><stop offset="100%" stop-color="#4f9e8e"/></linearGradient>
  <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cfe9e0"/><stop offset="100%" stop-color="#aedccf"/></linearGradient>
  <linearGradient id="smokeg" x1="0" y1="1" x2="0" y2="0"><stop offset="0%" stop-color="#9aa4a7"/><stop offset="55%" stop-color="#bcc3c6"/><stop offset="100%" stop-color="#dde1e3"/></linearGradient>
  <filter id="softsmoke" x="-70%" y="-70%" width="240%" height="260%"><feGaussianBlur stdDeviation="1.7"/></filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .glow    { transform-box: fill-box; transform-origin: 50% 100%; animation: glow 1.6s ease-in-out infinite; }
    .flame   { transform-box: fill-box; transform-origin: 50% 100%; animation: flick 0.85s ease-in-out infinite; }
    .flame-in{ transform-box: fill-box; transform-origin: 50% 100%; animation: flickIn 0.6s ease-in-out infinite; }
    .smoke   { transform-box: fill-box; transform-origin: 50% 100%; animation: rise2 3.4s ease-out infinite; }
    .synapse { stroke-dasharray: 3 6; animation: flow 0.8s linear infinite; }
    .node    { animation: nodepulse 1.8s ease-in-out infinite; }
    .n1{animation-delay:-1.5s}.n2{animation-delay:-1.1s}.n3{animation-delay:-0.7s}.n4{animation-delay:-0.3s}
    .box     { animation: boxpulse 2.2s ease-in-out infinite; }
    @keyframes flick   { 0%,100%{transform:scaleY(1) scaleX(1)} 20%{transform:scaleY(1.12) scaleX(0.93)} 45%{transform:scaleY(0.95) scaleX(1.05)} 70%{transform:scaleY(1.07) scaleX(0.96)} }
    @keyframes flickIn { 0%,100%{transform:scaleY(0.97) skewX(0deg)} 30%{transform:scaleY(1.15) skewX(4deg)} 55%{transform:scaleY(0.9) skewX(-4deg)} 80%{transform:scaleY(1.07) skewX(2deg)} }
    @keyframes glow    { 0%,100%{opacity:0.22; transform:scale(1)} 50%{opacity:0.5; transform:scale(1.15)} }
    @keyframes rise2   { 0%{transform:translate(0,8px) scale(0.6);opacity:0} 16%{opacity:0.8} 60%{opacity:0.45} 100%{transform:translate(6px,-30px) scale(1.25);opacity:0} }
    @keyframes flow    { to { stroke-dashoffset: -18; } }
    @keyframes nodepulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
    @keyframes boxpulse  { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
</defs>

<!-- arrows -->
<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- ===== CARD 1 — INPUT (cx=142) ===== -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <!-- photo frame -->
  <rect x="-64" y="-50" width="128" height="100" rx="9" fill="#eef5f2" stroke="#cdd4d6" stroke-width="2"/>
  <clipPath id="ph"><rect x="-62" y="-48" width="124" height="96" rx="8"/></clipPath>
  <g clip-path="url(#ph)">
    <rect x="-62" y="-48" width="124" height="96" fill="#eaf3ef"/>
    <path d="M-62 28 C -30 6 0 12 30 10 C 50 9 60 16 62 18 L62 48 L-62 48 Z" fill="url(#hill2)"/>
    <path d="M-62 40 C -34 20 -4 24 24 26 C 46 28 60 36 62 38 L62 48 L-62 48 Z" fill="url(#hill)"/>
    <path d="M-40 44 l8 0 l-8 -22 l-8 22 Z M-40 32 l5 0 l-5 -13 l-5 13 Z" fill="#15463f"/>
    <path d="M36 46 l8 0 l-8 -20 l-8 20 Z" fill="#15463f"/>
    <!-- smoke + flame -->
    <g filter="url(#softsmoke)"><g class="smoke" fill="url(#smokeg)" transform="translate(-2,18)"><circle cx="0" cy="0" r="6"/><circle cx="-5" cy="-8" r="8"/><circle cx="4" cy="-15" r="8"/><circle cx="-3" cy="-24" r="7"/></g></g>
    <g transform="translate(-2,40)">
      <g class="flame"><path d="M-13 0 C -16 -14 -4 -18 -8 -33 C -1 -22 4 -26 3 -37 C 7 -23 14 -20 11 0 Z" fill="#e3602f"/></g>
      <g class="flame-in"><path d="M-7 0 C -9 -9 -2 -13 -4 -22 C 0 -15 4 -18 3 -25 C 6 -16 9 -12 7 0 Z" fill="#f4a23c"/></g>
    </g>
  </g>
  <!-- camera REC badge -->
  <g transform="translate(-50,-38)"><circle r="7" fill="#fff" stroke="#e29578" stroke-width="2"/><circle r="3" fill="#e29578"/></g>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Input</text>
<text class="desc"  x="142" y="338" text-anchor="middle">A camera frame</text>

<!-- ===== CARD 2 — MODEL (cx=401) ===== -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <!-- board -->
  <rect x="-66" y="-56" width="132" height="112" rx="14" fill="#006d77"/>
  <rect x="-66" y="-56" width="132" height="112" rx="14" fill="none" stroke="#0a7d86" stroke-width="3"/>
  <!-- chip pins -->
  <g fill="#0a7d86"><rect x="-74" y="-30" width="8" height="6" rx="2"/><rect x="-74" y="-6" width="8" height="6" rx="2"/><rect x="-74" y="18" width="8" height="6" rx="2"/><rect x="66" y="-30" width="8" height="6" rx="2"/><rect x="66" y="-6" width="8" height="6" rx="2"/><rect x="66" y="18" width="8" height="6" rx="2"/></g>
  <!-- synapses -->
  <g stroke="#83c5be" stroke-width="1.4" opacity="0.6">
    <g class="synapse">
      <path d="M-38 -26 L0 -34 M-38 -26 L0 -2 M-38 -26 L0 30"/>
      <path d="M-38 0 L0 -34 M-38 0 L0 -2 M-38 0 L0 30"/>
      <path d="M-38 26 L0 -34 M-38 26 L0 -2 M-38 26 L0 30"/>
      <path d="M0 -34 L40 -16 M0 -34 L40 18 M0 -2 L40 -16 M0 -2 L40 18 M0 30 L40 -16 M0 30 L40 18"/>
    </g>
  </g>
  <!-- nodes -->
  <g fill="#bfe0d6">
    <circle class="node n1" cx="-38" cy="-26" r="6"/><circle class="node n2" cx="-38" cy="0" r="6"/><circle class="node n3" cx="-38" cy="26" r="6"/>
    <circle class="node n4" cx="0" cy="-34" r="6"/><circle class="node n2" cx="0" cy="-2" r="6"/><circle class="node n3" cx="0" cy="30" r="6"/>
    <circle class="node n1" cx="40" cy="-16" r="6"/><circle class="node n4" cx="40" cy="18" r="6"/>
  </g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Model</text>
<text class="desc"  x="401" y="338" text-anchor="middle">Runs on the device</text>

<!-- ===== CARD 3 — OUTPUT (cx=660) ===== -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <path d="M-66 46 C -34 22 0 28 30 24 C 50 21 62 30 66 34 L66 60 L-66 60 Z" fill="url(#hill2)"/>
  <path d="M-46 56 l9 0 l-9 -26 l-9 26 Z M-46 43 l6 0 l-6 -16 l-6 16 Z" fill="#3a8576"/>
  <path d="M44 56 l9 0 l-9 -24 l-9 24 Z" fill="#3a8576"/>
  <!-- smoke + flame -->
  <g filter="url(#softsmoke)"><g class="smoke" fill="url(#smokeg)" transform="translate(0,18)"><circle cx="0" cy="0" r="7"/><circle cx="-6" cy="-10" r="9"/><circle cx="5" cy="-19" r="9"/><circle cx="-3" cy="-30" r="8"/></g></g>
  <g transform="translate(0,46)">
    <ellipse class="glow" cx="0" cy="-12" rx="22" ry="14" fill="#f6a85a" opacity="0.3"/>
    <g class="flame"><path d="M-16 0 C -20 -18 -5 -23 -10 -42 C -1 -28 5 -33 4 -47 C 9 -29 18 -26 14 0 Z" fill="#e3602f"/></g>
    <g class="flame-in"><path d="M-9 0 C -11 -12 -3 -16 -5 -28 C 0 -19 5 -23 4 -32 C 8 -20 11 -15 8 0 Z" fill="#f4a23c"/></g>
  </g>
  <!-- bounding box + score pill -->
  <rect class="box" x="-42" y="-44" width="76" height="84" rx="4" fill="none" stroke="#e29578" stroke-width="4"/>
  <g transform="translate(-2,-54)"><rect x="-42" y="-12" width="84" height="22" rx="11" fill="#006d77"/><text x="0" y="4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">smoke 0.92</text></g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Output</text>
<text class="desc"  x="660" y="338" text-anchor="middle">Smoke boxed and scored</text>
</svg>
