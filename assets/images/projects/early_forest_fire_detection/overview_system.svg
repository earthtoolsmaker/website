<svg viewBox="0 0 1062 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="hill" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#88c8b9"/><stop offset="100%" stop-color="#4f9e8e"/></linearGradient>
  <linearGradient id="hill2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#cfe9e0"/><stop offset="100%" stop-color="#aedccf"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/>
  </marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%">
    <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/>
  </filter>
  <linearGradient id="smokeg" x1="0" y1="1" x2="0" y2="0">
    <stop offset="0%" stop-color="#9aa4a7"/><stop offset="55%" stop-color="#bcc3c6"/><stop offset="100%" stop-color="#dde1e3"/>
  </linearGradient>
  <filter id="softsmoke" x="-70%" y="-70%" width="240%" height="260%"><feGaussianBlur stdDeviation="1.9"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }

    .glow    { transform-box: fill-box; transform-origin: 50% 100%; animation: glow 1.6s ease-in-out infinite; }
    .flame   { transform-box: fill-box; transform-origin: 50% 100%; animation: flick 0.85s ease-in-out infinite; }
    .flame-in{ transform-box: fill-box; transform-origin: 50% 100%; animation: flickIn 0.6s ease-in-out infinite; }
    .flame.s { animation-duration: 0.7s; animation-delay: -0.3s; }
    .smoke   { transform-box: fill-box; transform-origin: 50% 100%; animation: rise2 3.4s ease-out infinite; }
    .smoke.b { animation: rise2b 3.4s ease-out infinite; animation-delay: -1.7s; }
    .ray   { animation: pulse 2.4s ease-in-out infinite; }
    .ray.r2 { animation-delay: -0.8s; } .ray.r3 { animation-delay: -1.6s; }
    .wave  { animation: pulse 2.1s ease-in-out infinite; }
    .wave.w2 { animation-delay: -0.7s; } .wave.w3 { animation-delay: -1.4s; }
    .water { stroke-dasharray: 2 9; animation: flow 0.9s linear infinite; }
    .beacon { animation: blink 1.4s steps(1,end) infinite; }

    @keyframes flick   { 0%,100%{transform:scaleY(1) scaleX(1)} 20%{transform:scaleY(1.13) scaleX(0.92) translateY(-1px)} 45%{transform:scaleY(0.94) scaleX(1.06)} 70%{transform:scaleY(1.08) scaleX(0.95) translateY(-1px)} }
    @keyframes flickIn { 0%,100%{transform:scaleY(0.97) skewX(0deg)} 30%{transform:scaleY(1.16) skewX(4deg)} 55%{transform:scaleY(0.9) skewX(-4deg)} 80%{transform:scaleY(1.07) skewX(2deg)} }
    @keyframes glow    { 0%,100%{opacity:0.22; transform:scale(1)} 50%{opacity:0.5; transform:scale(1.16)} }
    @keyframes rise2   { 0%{transform:translate(0,10px) scale(0.6);opacity:0} 16%{opacity:0.85} 60%{opacity:0.5} 100%{transform:translate(8px,-36px) scale(1.3);opacity:0} }
    @keyframes rise2b  { 0%{transform:translate(2px,8px) scale(0.55);opacity:0} 18%{opacity:0.7} 60%{opacity:0.4} 100%{transform:translate(-7px,-34px) scale(1.25);opacity:0} }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
    @keyframes flow { to { stroke-dashoffset: -22; } }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.2} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
</defs>

<!-- ============ CONNECTOR ARROWS ============ -->
<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
  <line x1="768" y1="134" x2="809" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- ============ CARD 1 — WATCH (cx=142) ============ -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <clipPath id="clip1"><rect x="-90" y="-78" width="180" height="156" rx="8"/></clipPath>
  <g clip-path="url(#clip1)">
    <path d="M-95 70 C -55 30 -16 34 12 30 C 46 25 72 40 96 70 Z" fill="url(#hill2)"/>
    <path d="M-84 72 C -50 34 -16 32 4 34 C 36 37 60 48 86 72 Z" fill="url(#hill)"/>
    <path d="M-54 60 l10 0 l-10 -28 l-10 28 Z M-54 46 l7 0 l-7 -17 l-7 17 Z" fill="#15463f"/>
    <path d="M52 62 l9 0 l-9 -25 l-9 25 Z M52 49 l6 0 l-6 -15 l-6 15 Z" fill="#15463f"/>
    <path d="M22 64 l7 0 l-7 -20 l-7 20 Z" fill="#1d5b51"/>
    <!-- lattice tower -->
    <g stroke="#15463f" stroke-width="4" stroke-linecap="round" fill="none">
      <path d="M-18 60 L-4 -50"/><path d="M10 60 L-0 -50"/>
      <path d="M-14 30 L7 30"/><path d="M-11 4 L4 4"/><path d="M-8 -22 L2 -22"/>
      <path d="M-14 30 L4 4 M-11 4 L2 -22" stroke-width="2.5"/>
    </g>
    <!-- camera head: cross-bar + two cameras -->
    <rect x="-16" y="-54" width="26" height="6" rx="3" fill="#15463f"/>
    <rect x="-18" y="-50" width="14" height="10" rx="2.5" fill="#006d77"/><circle cx="-12" cy="-45" r="3" fill="#e29578"/>
    <rect x="2" y="-50" width="14" height="10" rx="2.5" fill="#006d77"/><circle cx="9" cy="-45" r="3" fill="#e29578"/>
  </g>
  <!-- scanning sightlines -->
  <g stroke="#e29578" stroke-width="3" stroke-linecap="round">
    <path class="ray r1" d="M14 -48 L82 -64"/>
    <path class="ray r2" d="M14 -46 L84 -40"/>
    <path class="ray r3" d="M14 -44 L82 -14"/>
  </g>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Watch</text>
<text class="desc"  x="142" y="338" text-anchor="middle">Cameras scan the forest</text>

<!-- ============ CARD 2 — DETECT (cx=401) ============ -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <path d="M-46 60 l10 0 l-10 -28 l-10 28 Z M-46 46 l7 0 l-7 -17 l-7 17 Z" fill="#3a8576"/>
  <path d="M46 60 l10 0 l-10 -28 l-10 28 Z M46 46 l7 0 l-7 -17 l-7 17 Z" fill="#3a8576"/>
  <!-- smoke (two staggered, soft billowing plumes) -->
  <g filter="url(#softsmoke)" transform="translate(0,4)">
    <g class="smoke" fill="url(#smokeg)">
      <circle cx="0" cy="2" r="8"/><circle cx="-8" cy="-9" r="11"/><circle cx="7" cy="-13" r="11"/>
      <circle cx="-4" cy="-25" r="13"/><circle cx="6" cy="-33" r="11"/><circle cx="-3" cy="-45" r="10"/><circle cx="3" cy="-55" r="7"/>
    </g>
    <g class="smoke b" fill="url(#smokeg)">
      <circle cx="3" cy="0" r="7"/><circle cx="-6" cy="-13" r="9"/><circle cx="6" cy="-23" r="10"/>
      <circle cx="-4" cy="-35" r="10"/><circle cx="3" cy="-47" r="8"/>
    </g>
  </g>
  <!-- flame (flickering, with bright animated core) -->
  <g transform="translate(0,48)">
    <ellipse class="glow" cx="0" cy="-16" rx="32" ry="20" fill="#f6a85a" opacity="0.3"/>
    <g class="flame"><path d="M-22 0 C -27 -24 -7 -31 -13 -55 C -1 -37 6 -43 5 -62 C 12 -38 24 -34 19 0 Z" fill="#e3602f"/></g>
    <g class="flame-in"><path d="M-12 0 C -15 -16 -4 -22 -7 -38 C 0 -26 6 -31 4 -44 C 10 -28 16 -22 12 0 Z" fill="#f4a23c"/></g>
    <g class="flame-in"><path d="M-5 0 C -7 -10 -2 -14 -4 -26 C 1 -17 5 -20 4 -30 C 8 -18 9 -12 6 0 Z" fill="#ffd27a"/></g>
  </g>
  <!-- viewfinder brackets -->
  <g stroke="#e29578" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M-60 -40 L-60 -60 L-40 -60"/><path d="M40 -60 L60 -60 L60 -40"/>
    <path d="M-60 40 L-60 60 L-40 60"/><path d="M40 60 L60 60 L60 40"/>
  </g>
  <!-- AI chip badge -->
  <g transform="translate(48,-48)">
    <rect x="-16" y="-13" width="32" height="26" rx="6" fill="#006d77"/>
    <circle cx="-6" cy="-3" r="2.6" fill="#bfe0d6"/><circle cx="6" cy="-3" r="2.6" fill="#bfe0d6"/><circle cx="0" cy="7" r="2.6" fill="#bfe0d6"/>
    <path d="M-6 -3 L0 7 L6 -3" stroke="#83c5be" stroke-width="1.8" fill="none"/>
  </g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Detect</text>
<text class="desc"  x="401" y="338" text-anchor="middle">AI flags the smoke</text>

<!-- ============ CARD 3 — ALERT (cx=660) ============ -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <!-- firehouse -->
  <rect x="-64" y="2" width="64" height="54" rx="4" fill="#006d77"/>
  <path d="M-70 4 L-32 -22 L6 4 Z" fill="#15463f"/>
  <!-- garage door -->
  <rect x="-54" y="20" width="44" height="36" rx="3" fill="#cfe9e0"/>
  <g stroke="#9ad2c4" stroke-width="2"><path d="M-54 30 L-10 30"/><path d="M-54 40 L-10 40"/><path d="M-54 50 L-10 50"/></g>
  <!-- coral cross sign -->
  <g fill="#e29578"><rect x="-35" y="-12" width="6" height="16"/><rect x="-40" y="-7" width="16" height="6"/></g>
  <!-- antenna -->
  <path d="M28 56 L28 -28" stroke="#3a8576" stroke-width="4" stroke-linecap="round"/>
  <circle cx="28" cy="-30" r="5" fill="#006d77"/>
  <!-- broadcast waves -->
  <g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
    <path class="wave w1" d="M38 -42 A 17 17 0 0 1 38 -18"/>
    <path class="wave w2" d="M48 -50 A 29 29 0 0 1 48 -10"/>
    <path class="wave w3" d="M58 -58 A 41 41 0 0 1 58 -2"/>
  </g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Alert</text>
<text class="desc"  x="660" y="338" text-anchor="middle">Sent to the fire dept</text>

<!-- ============ CARD 4 — RESPOND (cx=919) ============ -->
<rect x="813" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(919,128)">
  <!-- small flame being doused -->
  <g transform="translate(62,42) scale(0.5)">
    <g class="flame s"><path d="M-22 0 C -27 -24 -7 -31 -13 -55 C -1 -37 6 -43 5 -62 C 12 -38 24 -34 19 0 Z" fill="#e3602f"/></g>
    <g class="flame-in"><path d="M-12 0 C -15 -16 -4 -22 -7 -38 C 0 -26 6 -31 4 -44 C 10 -28 16 -22 12 0 Z" fill="#f4a23c"/></g>
  </g>
  <!-- fire truck -->
  <g transform="translate(-18,16)">
    <rect x="-60" y="-24" width="60" height="32" rx="5" fill="#006d77"/>
    <rect x="0" y="-12" width="30" height="20" rx="4" fill="#0a7d86"/>
    <rect x="6" y="-8" width="18" height="11" rx="2" fill="#cfe9e0"/>
    <rect x="-58" y="-4" width="56" height="8" fill="#15463f"/>
    <!-- ladder -->
    <g stroke="#e29578" stroke-width="3.5" stroke-linecap="round"><path d="M-52 -26 L6 -34"/><path d="M-44 -28 L-44 -24 M-30 -30 L-30 -25 M-16 -32 L-16 -26 M-2 -33 L-2 -28"/></g>
    <!-- beacon -->
    <circle class="beacon" cx="15" cy="-16" r="3.5" fill="#f4a23c"/>
    <!-- wheels -->
    <circle cx="-40" cy="10" r="10" fill="#15463f"/><circle cx="-40" cy="10" r="4" fill="#cfe9e0"/>
    <circle cx="-2" cy="10" r="10" fill="#15463f"/><circle cx="-2" cy="10" r="4" fill="#cfe9e0"/>
  </g>
  <!-- water arc -->
  <path class="water" d="M2 -16 C 30 -40 54 -26 64 18" stroke="#83c5be" stroke-width="5" fill="none" stroke-linecap="round"/>
</g>
<text class="step" x="919" y="280" text-anchor="middle">04</text>
<text class="title" x="919" y="312" text-anchor="middle">Respond</text>
<text class="desc"  x="919" y="338" text-anchor="middle">Crews move in</text>
</svg>
