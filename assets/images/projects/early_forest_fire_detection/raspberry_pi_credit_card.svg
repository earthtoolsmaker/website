<svg viewBox="0 0 680 300" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="card" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#eef2f4"/><stop offset="100%" stop-color="#d7dee2"/></linearGradient>
  <linearGradient id="pcb" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#2f7468"/><stop offset="100%" stop-color="#225a51"/></linearGradient>
  <pattern id="gpio" width="11.6" height="20" patternUnits="userSpaceOnUse">
    <rect width="11.6" height="20" fill="#13403a"/>
    <rect x="3.3" y="3" width="5" height="6" rx="1.5" fill="#e8c07d"/>
    <rect x="3.3" y="11" width="5" height="6" rx="1.5" fill="#e8c07d"/>
  </pattern>
  <filter id="sh" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="6" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.13"/></filter>
  <style>.lbl{font-size:15px;font-weight:600;fill:#60626a}</style>
</defs>

<!-- ===== credit card ===== -->
<g filter="url(#sh)">
  <rect x="36" y="52" width="288" height="182" rx="15" fill="url(#card)" stroke="#c9d2d7" stroke-width="1.5"/>
  <rect x="36" y="72" width="288" height="24" fill="#b7c1c6"/>
  <rect x="64" y="120" width="46" height="36" rx="6" fill="#e3b66f"/>
  <g stroke="#c79a55" stroke-width="1.5"><path d="M87 120 L87 156 M64 132 L110 132 M64 144 L110 144"/></g>
  <g transform="translate(150,138)" stroke="#aab3b8" stroke-width="2.5" fill="none" stroke-linecap="round"><path d="M0 -10 A 14 14 0 0 1 0 10"/><path d="M8 -16 A 22 22 0 0 1 8 16"/></g>
  <g fill="#aeb8bd"><rect x="64" y="182" width="38" height="9" rx="3"/><rect x="114" y="182" width="38" height="9" rx="3"/><rect x="164" y="182" width="38" height="9" rx="3"/><rect x="214" y="182" width="38" height="9" rx="3"/></g>
  <rect x="64" y="205" width="116" height="8" rx="3" fill="#c2cbd0"/>
</g>
<text class="lbl" x="180" y="270" text-anchor="middle">Credit card</text>

<!-- ===== equals ===== -->
<g fill="#e29578"><rect x="331" y="134" width="18" height="5" rx="2.5"/><rect x="331" y="146" width="18" height="5" rx="2.5"/></g>

<!-- ===== raspberry pi board ===== -->
<g filter="url(#sh)">
  <rect x="356" y="52" width="288" height="182" rx="11" fill="url(#pcb)"/>
  <g fill="#cfe9e0"><circle cx="376" cy="72" r="7"/><circle cx="624" cy="72" r="7"/><circle cx="376" cy="214" r="7"/><circle cx="624" cy="214" r="7"/></g>
  <g fill="#225a51"><circle cx="376" cy="72" r="3"/><circle cx="624" cy="72" r="3"/><circle cx="376" cy="214" r="3"/><circle cx="624" cy="214" r="3"/></g>
  <rect x="392" y="62" width="232" height="20" rx="2" fill="url(#gpio)"/>
  <rect x="468" y="120" width="58" height="58" rx="5" fill="#14403a"/>
  <rect x="481" y="133" width="32" height="32" rx="2" fill="#1f5249"/>
  <g fill="#9aa4a7" stroke="#7c878b" stroke-width="1.5">
    <rect x="622" y="98" width="36" height="28" rx="3"/>
    <rect x="622" y="134" width="36" height="24" rx="3"/>
    <rect x="622" y="166" width="36" height="24" rx="3"/>
  </g>
  <g fill="#b9c1c4"><rect x="402" y="216" width="26" height="14" rx="2"/><rect x="444" y="216" width="20" height="14" rx="2"/><rect x="520" y="216" width="22" height="14" rx="2"/></g>
  <rect x="400" y="120" width="12" height="20" rx="2" fill="#13403a"/>
  <rect x="540" y="116" width="20" height="12" rx="2" fill="#e29578"/>
  <rect x="548" y="170" width="16" height="10" rx="2" fill="#cfe9e0"/>
  <rect x="420" y="170" width="14" height="14" rx="2" fill="#13403a"/>
</g>
<text class="lbl" x="500" y="270" text-anchor="middle">Raspberry Pi</text>
</svg>
