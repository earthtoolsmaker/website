<svg viewBox="0 0 804 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bfe6e4"/><stop offset="100%" stop-color="#5fb0bb"/></linearGradient>
  <linearGradient id="waterdeep" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9fd6d4"/><stop offset="100%" stop-color="#3f97a3"/></linearGradient>
  <linearGradient id="salmong" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8543a"/><stop offset="60%" stop-color="#ec7a52"/><stop offset="100%" stop-color="#f4a98a"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .synapse { stroke-dasharray: 3 6; animation: flow 0.8s linear infinite; }
    .node    { animation: nodepulse 1.8s ease-in-out infinite; }
    .n1{animation-delay:-1.5s}.n2{animation-delay:-1.1s}.n3{animation-delay:-0.7s}.n4{animation-delay:-0.3s}
    .box     { animation: boxpulse 2.2s ease-in-out infinite; }
    .swim  { transform-box: fill-box; transform-origin: 50% 50%; animation: swim 3.4s ease-in-out infinite; }
    .shimmer { stroke-dasharray: 3 10; animation: flow 1.6s linear infinite; }
    @keyframes flow { to { stroke-dashoffset: -18; } }
    @keyframes nodepulse { 0%,100%{opacity:0.35} 50%{opacity:1} }
    @keyframes boxpulse  { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes swim { 0%,100%{transform:translateX(0) rotate(0deg)} 50%{transform:translateX(5px) rotate(-2deg)} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <g id="salmon">
    <path d="M-42 0 L-62 -16 L-51 0 L-62 16 Z" fill="#c8492f"/>
    <path d="M-44 0 C -28 -18 22 -18 44 0 C 22 18 -28 18 -44 0 Z" fill="url(#salmong)"/>
    <path d="M-30 -10 C -8 -16 22 -15 40 -3 C 20 -11 -10 -12 -30 -10 Z" fill="#c8492f" opacity="0.55"/>
    <path d="M-4 -13 L8 -29 L22 -12 Z" fill="#d8543a"/>
    <path d="M-2 13 L8 26 L22 12 Z" fill="#d8543a"/>
    <path d="M16 6 L26 19 L33 6 Z" fill="#e0654a"/>
    <path d="M22 -11 C 18 -3 18 4 22 11" stroke="#c8492f" stroke-width="1.7" fill="none" opacity="0.7"/>
    <circle cx="31" cy="-3" r="3.3" fill="#2a2320"/><circle cx="32.2" cy="-4.2" r="1" fill="#fff"/>
  </g>
</defs>

<!-- arrows -->
<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- ===== CARD 1 — INPUT (cx=142) ===== -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <rect x="-64" y="-50" width="128" height="100" rx="9" fill="#eef5f2" stroke="#cdd4d6" stroke-width="2"/>
  <clipPath id="ph"><rect x="-62" y="-48" width="124" height="96" rx="8"/></clipPath>
  <g clip-path="url(#ph)">
    <rect x="-62" y="-48" width="124" height="96" fill="url(#waterdeep)"/>
    <path class="shimmer" d="M-62 -30 L62 -30" stroke="#eaf7f6" stroke-width="2" fill="none" opacity="0.6"/>
    <path class="shimmer" d="M-62 30 L62 30" stroke="#eaf7f6" stroke-width="2" fill="none" opacity="0.4"/>
    <g fill="#2f7e88" opacity="0.5"><circle cx="-40" cy="46" r="9"/><circle cx="-2" cy="50" r="11"/><circle cx="40" cy="46" r="10"/></g>
    <g class="swim" transform="translate(-2,2) scale(0.92)"><use href="#salmon"/></g>
  </g>
  <!-- camera REC badge -->
  <g transform="translate(-50,-38)"><circle r="7" fill="#fff" stroke="#e29578" stroke-width="2"/><circle r="3" fill="#e29578"/></g>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Input</text>
<text class="desc"  x="142" y="338" text-anchor="middle">An underwater frame</text>

<!-- ===== CARD 2 — MODEL (cx=401) — reused neural-net board ===== -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <rect x="-66" y="-56" width="132" height="112" rx="14" fill="#006d77"/>
  <rect x="-66" y="-56" width="132" height="112" rx="14" fill="none" stroke="#0a7d86" stroke-width="3"/>
  <g fill="#0a7d86"><rect x="-74" y="-30" width="8" height="6" rx="2"/><rect x="-74" y="-6" width="8" height="6" rx="2"/><rect x="-74" y="18" width="8" height="6" rx="2"/><rect x="66" y="-30" width="8" height="6" rx="2"/><rect x="66" y="-6" width="8" height="6" rx="2"/><rect x="66" y="18" width="8" height="6" rx="2"/></g>
  <g stroke="#83c5be" stroke-width="1.4" opacity="0.6">
    <g class="synapse">
      <path d="M-38 -26 L0 -34 M-38 -26 L0 -2 M-38 -26 L0 30"/>
      <path d="M-38 0 L0 -34 M-38 0 L0 -2 M-38 0 L0 30"/>
      <path d="M-38 26 L0 -34 M-38 26 L0 -2 M-38 26 L0 30"/>
      <path d="M0 -34 L40 -16 M0 -34 L40 18 M0 -2 L40 -16 M0 -2 L40 18 M0 30 L40 -16 M0 30 L40 18"/>
    </g>
  </g>
  <g fill="#bfe0d6">
    <circle class="node n1" cx="-38" cy="-26" r="6"/><circle class="node n2" cx="-38" cy="0" r="6"/><circle class="node n3" cx="-38" cy="26" r="6"/>
    <circle class="node n4" cx="0" cy="-34" r="6"/><circle class="node n2" cx="0" cy="-2" r="6"/><circle class="node n3" cx="0" cy="30" r="6"/>
    <circle class="node n1" cx="40" cy="-16" r="6"/><circle class="node n4" cx="40" cy="18" r="6"/>
  </g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Model</text>
<text class="desc"  x="401" y="338" text-anchor="middle">Runs the vision model</text>

<!-- ===== CARD 3 — OUTPUT (cx=660) ===== -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <clipPath id="po"><rect x="-64" y="-50" width="128" height="100" rx="9"/></clipPath>
  <rect x="-64" y="-50" width="128" height="100" rx="9" fill="#eef5f2" stroke="#cdd4d6" stroke-width="2"/>
  <g clip-path="url(#po)">
    <rect x="-62" y="-48" width="124" height="96" fill="url(#waterdeep)"/>
    <path class="shimmer" d="M-62 -28 L62 -28" stroke="#eaf7f6" stroke-width="2" fill="none" opacity="0.5"/>
    <g fill="#2f7e88" opacity="0.5"><circle cx="-36" cy="48" r="9"/><circle cx="6" cy="50" r="11"/></g>
    <g class="swim" transform="translate(-2,4) scale(0.92)"><use href="#salmon"/></g>
  </g>
  <!-- bounding box + species pill -->
  <rect class="box" x="-46" y="-30" width="92" height="64" rx="4" fill="none" stroke="#e29578" stroke-width="4"/>
  <g transform="translate(0,-42)"><rect x="-50" y="-12" width="100" height="22" rx="11" fill="#006d77"/><text x="0" y="4" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">Sockeye 0.94</text></g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Output</text>
<text class="desc"  x="660" y="338" text-anchor="middle">Boxed and identified</text>
</svg>
