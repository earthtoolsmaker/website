<svg viewBox="0 0 1062 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="water" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#bfe6e4"/><stop offset="100%" stop-color="#5fb0bb"/></linearGradient>
  <linearGradient id="waterdeep" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9fd6d4"/><stop offset="100%" stop-color="#3f97a3"/></linearGradient>
  <linearGradient id="salmong" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#d8543a"/><stop offset="60%" stop-color="#ec7a52"/><stop offset="100%" stop-color="#f4a98a"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .pill  { font-size: 12.5px; font-weight: 700; fill: #fff; }
    .swim  { transform-box: fill-box; transform-origin: 50% 50%; animation: swim 3.2s ease-in-out infinite; }
    .swim.b{ animation-duration: 3.8s; animation-delay: -1.4s; }
    .ray   { animation: pulse 2.4s ease-in-out infinite; } .ray.r2 { animation-delay: -0.9s; }
    .wave  { animation: pulse 2.1s ease-in-out infinite; } .wave.w2 { animation-delay: -0.7s; } .wave.w3 { animation-delay: -1.4s; }
    .flow  { stroke-dasharray: 2 8; animation: flow 0.9s linear infinite; }
    .box   { animation: boxpulse 2.2s ease-in-out infinite; }
    .shimmer { stroke-dasharray: 3 10; animation: flow 1.6s linear infinite; }
    .rotor { transform-box: fill-box; transform-origin: 50% 50%; animation: spin 0.5s linear infinite; }
    .count { animation: nudge 3s ease-in-out infinite; }
    @keyframes swim { 0%,100%{transform:translateX(0) rotate(0deg)} 50%{transform:translateX(6px) rotate(-2deg)} }
    @keyframes pulse { 0%,100%{opacity:0.2} 50%{opacity:1} }
    @keyframes flow { to { stroke-dashoffset: -20; } }
    @keyframes boxpulse { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes spin { to { transform: scaleX(0.2); } }
    @keyframes nudge { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-3px)} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>

  <!-- ===== reusable salmon (faces right) ===== -->
  <g id="salmon">
    <path d="M-42 0 L-62 -16 L-51 0 L-62 16 Z" fill="#c8492f"/>
    <path d="M-44 0 C -28 -18 22 -18 44 0 C 22 18 -28 18 -44 0 Z" fill="url(#salmong)"/>
    <path d="M-30 -10 C -8 -16 22 -15 40 -3 C 20 -11 -10 -12 -30 -10 Z" fill="#c8492f" opacity="0.55"/>
    <path d="M-4 -13 L8 -29 L22 -12 Z" fill="#d8543a"/>
    <path d="M-2 13 L8 26 L22 12 Z" fill="#d8543a"/>
    <path d="M16 6 L26 19 L33 6 Z" fill="#e0654a"/>
    <path d="M22 -11 C 18 -3 18 4 22 11" stroke="#c8492f" stroke-width="1.7" fill="none" opacity="0.7"/>
    <circle cx="31" cy="-3" r="3.3" fill="#2a2320"/><circle cx="32.2" cy="-4.2" r="1" fill="#fff"/>
  </g>
</defs>

<!-- ============ CONNECTOR ARROWS ============ -->
<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
  <line x1="768" y1="134" x2="809" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- ============ CARD 1 — WATCH (cx=142) ============ -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <clipPath id="c1"><rect x="-90" y="-84" width="180" height="168" rx="12"/></clipPath>
  <g clip-path="url(#c1)">
    <rect x="-90" y="-84" width="180" height="168" fill="#f3faf9"/>
    <!-- water body -->
    <rect x="-90" y="-28" width="180" height="112" fill="url(#water)"/>
    <!-- waterline shimmer -->
    <path class="shimmer" d="M-90 -28 L90 -28" stroke="#eaf7f6" stroke-width="3" fill="none"/>
    <path class="shimmer" d="M-90 -2 L90 -2" stroke="#ffffff" stroke-width="1.5" fill="none" opacity="0.45"/>
    <!-- riverbed pebbles -->
    <g fill="#3f97a3" opacity="0.5"><circle cx="-56" cy="74" r="8"/><circle cx="-20" cy="80" r="10"/><circle cx="30" cy="76" r="9"/><circle cx="66" cy="80" r="11"/></g>
    <!-- salmon -->
    <g class="swim" transform="translate(-4,40) scale(0.82)"><use href="#salmon"/></g>
    <!-- drone (in the air, top) -->
    <g transform="translate(0,-58)">
      <rect x="-14" y="-2" width="28" height="6" rx="3" fill="#15463f"/>
      <rect x="-8" y="-3" width="16" height="9" rx="3" fill="#006d77"/>
      <ellipse class="rotor" cx="-14" cy="-3" rx="8" ry="2.4" fill="#3a8576"/>
      <ellipse class="rotor" cx="14" cy="-3" rx="8" ry="2.4" fill="#3a8576"/>
      <path class="flow" d="M0 6 L0 34" stroke="#e29578" stroke-width="2" fill="none"/>
    </g>
    <!-- underwater camera, bottom-left, facing right -->
    <g transform="translate(-64,30)">
      <rect x="-3" y="0" width="4" height="48" fill="#15463f"/>
      <rect x="-12" y="-14" width="24" height="15" rx="3" fill="#006d77"/>
      <circle cx="11" cy="-6.5" r="5.5" fill="#0a3f44"/><circle cx="12" cy="-7" r="2.4" fill="#83c5be"/>
      <circle cx="-6" cy="-10" r="2" fill="#e29578"/>
    </g>
    <g stroke="#e29578" stroke-width="2.4" stroke-linecap="round" transform="translate(-50,23)">
      <path class="ray r1" d="M0 0 L46 4"/>
      <path class="ray r2" d="M0 4 L46 18"/>
    </g>
    <!-- sonar, bottom-right, emitting left -->
    <g transform="translate(74,40)">
      <rect x="0" y="-5" width="11" height="16" rx="3" fill="#006d77"/>
      <g stroke="#e29578" stroke-width="2.8" fill="none" stroke-linecap="round">
        <path class="wave w1" d="M-4 -10 A 13 13 0 0 0 -4 12"/>
        <path class="wave w2" d="M-12 -16 A 21 21 0 0 0 -12 18"/>
        <path class="wave w3" d="M-20 -22 A 29 29 0 0 0 -20 24"/>
      </g>
    </g>
  </g>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Watch</text>
<text class="desc"  x="142" y="338" text-anchor="middle">Sensors track the river</text>

<!-- ============ CARD 2 — DETECT (cx=401) ============ -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <clipPath id="c2"><rect x="-90" y="-84" width="180" height="168" rx="12"/></clipPath>
  <g clip-path="url(#c2)">
    <rect x="-90" y="-84" width="180" height="168" fill="url(#waterdeep)"/>
    <path class="shimmer" d="M-90 -60 L90 -60" stroke="#eaf7f6" stroke-width="2" fill="none" opacity="0.6"/>
    <path class="shimmer" d="M-90 64 L90 64" stroke="#eaf7f6" stroke-width="2" fill="none" opacity="0.4"/>
    <g class="swim" transform="translate(-2,4) scale(1.02)"><use href="#salmon"/></g>
  </g>
  <!-- viewfinder brackets -->
  <g stroke="#fbf6f6" stroke-width="5" fill="none" stroke-linecap="round">
    <path d="M-60 -40 L-60 -60 L-40 -60"/><path d="M40 -60 L60 -60 L60 -40"/>
    <path d="M-60 40 L-60 60 L-40 60"/><path d="M40 60 L60 60 L60 40"/>
  </g>
  <rect class="box" x="-58" y="-40" width="116" height="80" rx="4" fill="none" stroke="#e29578" stroke-width="3.5"/>
  <!-- AI chip badge -->
  <g transform="translate(50,-50)">
    <rect x="-16" y="-13" width="32" height="26" rx="6" fill="#006d77"/>
    <circle cx="-6" cy="-3" r="2.6" fill="#bfe0d6"/><circle cx="6" cy="-3" r="2.6" fill="#bfe0d6"/><circle cx="0" cy="7" r="2.6" fill="#bfe0d6"/>
    <path d="M-6 -3 L0 7 L6 -3" stroke="#83c5be" stroke-width="1.8" fill="none"/>
  </g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Detect</text>
<text class="desc"  x="401" y="338" text-anchor="middle">AI spots each fish</text>

<!-- ============ CARD 3 — CLASSIFY (cx=660) ============ -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <clipPath id="c3"><rect x="-90" y="-84" width="180" height="168" rx="12"/></clipPath>
  <g clip-path="url(#c3)">
    <rect x="-90" y="-84" width="180" height="168" fill="#f3faf9"/>
    <rect x="-90" y="18" width="180" height="66" fill="url(#water)" opacity="0.9"/>
    <g class="swim b" transform="translate(-2,30) scale(0.9)"><use href="#salmon"/></g>
  </g>
  <!-- species pill -->
  <g transform="translate(0,-44)" class="count">
    <rect x="-52" y="-15" width="104" height="30" rx="15" fill="#006d77"/>
    <path d="M0 15 L-7 24 L7 24 Z" fill="#006d77"/>
    <text class="pill" x="-8" y="4" text-anchor="middle">Sockeye</text>
    <circle cx="34" cy="0" r="9" fill="#0a7d86"/><text x="34" y="4" text-anchor="middle" font-size="10" font-weight="700" fill="#bfe0d6">.94</text>
  </g>
  <!-- species candidate dots -->
  <g transform="translate(0,70)">
    <g fill="#cfe9e0"><circle cx="-30" cy="0" r="5"/><circle cx="-10" cy="0" r="5"/><circle cx="30" cy="0" r="5"/></g>
    <circle cx="10" cy="0" r="6.5" fill="#e29578"/><circle cx="10" cy="0" r="9.5" fill="none" stroke="#006d77" stroke-width="2"/>
  </g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Classify</text>
<text class="desc"  x="660" y="338" text-anchor="middle">Identifies the species</text>

<!-- ============ CARD 4 — COUNT (cx=919) ============ -->
<rect x="813" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(919,128)">
  <!-- report panel -->
  <rect x="-72" y="-58" width="144" height="116" rx="14" fill="#006d77"/>
  <rect x="-72" y="-58" width="144" height="34" rx="14" fill="#0a7d86"/>
  <rect x="-72" y="-40" width="144" height="16" fill="#0a7d86"/>
  <circle cx="-58" cy="-41" r="4" fill="#bfe0d6"/><circle cx="-46" cy="-41" r="4" fill="#83c5be"/>
  <text x="14" y="-36" text-anchor="middle" font-size="11" font-weight="700" fill="#cfe9e0" letter-spacing="0.08em">SEASON COUNT</text>
  <!-- big number -->
  <text class="count" x="0" y="6" text-anchor="middle" font-size="34" font-weight="800" fill="#ffffff" font-family="Mulish, Arial, sans-serif">1,248</text>
  <!-- mini bar chart -->
  <g transform="translate(0,40)">
    <rect x="-52" y="-14" width="14" height="14" rx="2" fill="#83c5be"/>
    <rect x="-32" y="-20" width="14" height="20" rx="2" fill="#9fd6d4"/>
    <rect x="-12" y="-12" width="14" height="12" rx="2" fill="#83c5be"/>
    <rect x="8"  y="-24" width="14" height="24" rx="2" fill="#bfe0d6"/>
    <rect x="28" y="-30" width="14" height="30" rx="2" fill="#e29578"/>
  </g>
  <!-- up-trend arrow -->
  <g transform="translate(54,-6)"><path d="M-4 8 L4 -6 L0 -6 L0 -2 M4 -6 L0 -6 M4 -6 L4 -2" stroke="#e29578" stroke-width="0" fill="none"/>
    <path d="M-6 6 L6 -8" stroke="#f4a23c" stroke-width="3" stroke-linecap="round"/><path d="M6 -8 L1 -8 M6 -8 L6 -3" stroke="#f4a23c" stroke-width="3" stroke-linecap="round" fill="none"/>
  </g>
</g>
<text class="step" x="919" y="280" text-anchor="middle">04</text>
<text class="title" x="919" y="312" text-anchor="middle">Count</text>
<text class="desc"  x="919" y="338" text-anchor="middle">Tallies the run</text>
</svg>
