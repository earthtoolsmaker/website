<svg viewBox="0 0 1062 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="night" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1d2c44"/><stop offset="100%" stop-color="#26384f"/></linearGradient>
  <linearGradient id="nvis" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#16291f"/><stop offset="100%" stop-color="#284536"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <pattern id="nvnoise" width="7" height="7" patternUnits="userSpaceOnUse"><circle cx="1.5" cy="1.5" r="0.7" fill="#8fe0a8" opacity="0.12"/><circle cx="5" cy="4.5" r="0.5" fill="#8fe0a8" opacity="0.09"/></pattern>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .chip  { font-size: 11px; font-weight: 700; fill: #fff; }
    .prowl { transform-box: fill-box; transform-origin: 50% 50%; animation: prowl 4s ease-in-out infinite; }
    .beam  { animation: pulse 2.4s ease-in-out infinite; }
    .box   { animation: boxp 2.2s ease-in-out infinite; }
    .bolt  { animation: blink 1.1s steps(1,end) infinite; }
    .dance { transform-box: fill-box; transform-origin: 50% 100%; animation: dance 1.3s ease-in-out infinite; }
    .flee  { transform-box: fill-box; transform-origin: 50% 50%; animation: flee 3s ease-in-out infinite; }
    @keyframes prowl { 0%,100%{transform:translateX(0)} 50%{transform:translateX(8px)} }
    @keyframes pulse { 0%,100%{opacity:0.25} 50%{opacity:0.7} }
    @keyframes boxp { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0.3} }
    @keyframes dance { 0%,100%{transform:rotate(-7deg) skewX(4deg)} 50%{transform:rotate(7deg) skewX(-4deg)} }
    @keyframes flee { 0%,100%{transform:translateX(0)} 50%{transform:translateX(-7px)} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <!-- brown bear (faces right) -->
  <g id="bear" fill="#6e4a30">
    <ellipse cx="0" cy="0" rx="26" ry="16"/>
    <circle cx="22" cy="-7" r="11"/>
    <circle cx="16" cy="-16" r="4.2"/><circle cx="29" cy="-16" r="4.2"/>
    <ellipse cx="32" cy="-4" rx="6" ry="4.5" fill="#5a3c26"/><circle cx="37" cy="-5" r="1.5" fill="#221913"/>
    <circle cx="24" cy="-9" r="1.5" fill="#221913"/>
    <rect x="-18" y="9" width="9" height="15" rx="3"/><rect x="-2" y="11" width="9" height="14" rx="3"/><rect x="13" y="10" width="9" height="14" rx="3"/>
  </g>
  <!-- AI camera on a pole -->
  <g id="camera">
    <rect x="-2" y="-2" width="4" height="56" fill="#15463f"/>
    <rect x="-16" y="-18" width="30" height="16" rx="3" fill="#15463f"/>
    <circle cx="12" cy="-10" r="6" fill="#0a3f44"/><circle cx="13" cy="-10" r="2.4" fill="#83c5be"/>
    <circle cx="-9" cy="-13" r="1.6" fill="#e29578"/><circle cx="-9" cy="-7" r="1.6" fill="#e29578"/>
  </g>
  <!-- inflatable sky-dancer -->
  <g id="skydancer">
    <rect x="-11" y="54" width="22" height="12" rx="3" fill="#15463f"/>
    <g class="dance">
      <path d="M0 56 C -16 38 14 26 0 8 C -12 -8 8 -18 1 -38" stroke="#f4a23c" stroke-width="13" fill="none" stroke-linecap="round"/>
      <path d="M0 6 C 16 0 22 12 31 6" stroke="#e3602f" stroke-width="6.5" fill="none" stroke-linecap="round"/>
      <circle cx="1" cy="-40" r="8.5" fill="#f4a23c"/>
    </g>
  </g>
</defs>

<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
  <line x1="768" y1="134" x2="809" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- CARD 1 — WATCH -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <clipPath id="c1"><rect x="-90" y="-84" width="180" height="168" rx="12"/></clipPath>
  <g clip-path="url(#c1)">
    <rect x="-90" y="-84" width="180" height="168" fill="url(#night)"/>
    <circle cx="58" cy="-58" r="9" fill="#cfe0d6" opacity="0.8"/>
    <g fill="#fff" opacity="0.55"><circle cx="-50" cy="-60" r="1.2"/><circle cx="-20" cy="-70" r="1"/><circle cx="20" cy="-66" r="1.2"/><circle cx="-66" cy="-40" r="1"/></g>
    <path d="M-90 52 Q0 40 90 52 L90 84 L-90 84 Z" fill="#16243a"/>
    <!-- camera on pole (right) -->
    <g transform="translate(50,28) scale(0.9)"><use href="#camera"/></g>
    <!-- detection beam toward the bear -->
    <path class="beam" d="M36 12 L-58 36 L-58 70 L40 40 Z" fill="#83c5be" opacity="0.18"/>
    <!-- bear approaching (left, in the dark) -->
    <g transform="translate(-46,42) scale(0.62)"><g class="prowl"><use href="#bear"/></g></g>
  </g>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Watch</text>
<text class="desc"  x="142" y="338" text-anchor="middle">A camera watches the edge</text>

<!-- CARD 2 — DETECT -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <clipPath id="c2"><rect x="-84" y="-72" width="168" height="144" rx="12"/></clipPath>
  <rect x="-84" y="-72" width="168" height="144" rx="12" fill="url(#nvis)"/>
  <g clip-path="url(#c2)">
    <rect x="-84" y="-72" width="168" height="144" fill="url(#nvnoise)"/>
    <g stroke="#5f8f6f" stroke-width="1" opacity="0.3"><path d="M-84 -36 H84 M-84 0 H84 M-84 36 H84"/></g>
    <g transform="translate(-4,8) scale(1.05)"><g class="prowl"><use href="#bear"/></g></g>
  </g>
  <rect class="box" x="-56" y="-22" width="104" height="56" rx="3" fill="none" stroke="#e8232a" stroke-width="3"/>
  <g transform="translate(-22,-30)"><rect x="-30" y="-11" width="60" height="20" rx="10" fill="#e8232a"/><text class="chip" x="0" y="4" text-anchor="middle">bear 0.94</text></g>
  <!-- on-device chip badge -->
  <g transform="translate(52,-52)"><rect x="-22" y="-12" width="44" height="24" rx="6" fill="#006d77"/><text class="chip" x="0" y="4" text-anchor="middle" font-size="9.5">on-device</text></g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Detect</text>
<text class="desc"  x="401" y="338" text-anchor="middle">A bear, on the edge device</text>

<!-- CARD 3 — TRIGGER -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <!-- Raspberry Pi board -->
  <rect x="-60" y="-42" width="120" height="84" rx="8" fill="#0c5a51"/>
  <rect x="-60" y="-42" width="120" height="84" rx="8" fill="none" stroke="#12796c" stroke-width="3"/>
  <g fill="#0a3f44"><circle cx="-51" cy="-33" r="2.6"/><circle cx="51" cy="-33" r="2.6"/><circle cx="-51" cy="33" r="2.6"/><circle cx="51" cy="33" r="2.6"/></g>
  <!-- 40-pin GPIO header -->
  <rect x="-46" y="-38" width="84" height="11" rx="1.5" fill="#15201f"/>
  <g stroke="#e8b84b" stroke-width="1.8"><path d="M-42 -36 V-29 M-37 -36 V-29 M-32 -36 V-29 M-27 -36 V-29 M-22 -36 V-29 M-17 -36 V-29 M-12 -36 V-29 M-7 -36 V-29 M-2 -36 V-29 M3 -36 V-29 M8 -36 V-29 M13 -36 V-29 M18 -36 V-29 M23 -36 V-29 M28 -36 V-29 M33 -36 V-29"/></g>
  <!-- SoC chip + raspberry accent -->
  <rect x="-16" y="-12" width="28" height="26" rx="3" fill="#0a3f44"/><circle cx="-2" cy="1" r="5" fill="#cf5b6a"/>
  <!-- ports on the right edge -->
  <g fill="#9aa5a8"><rect x="46" y="-16" width="16" height="13" rx="2"/><rect x="46" y="3" width="16" height="15" rx="2"/></g>
  <!-- power/activity LED -->
  <circle class="bolt" cx="-50" cy="20" r="3" fill="#3fd07a"/>
  <!-- label -->
  <text x="-30" y="30" font-size="10" font-weight="700" fill="#83c5be">Raspberry Pi</text>
  <!-- trigger signal out -->
  <g class="bolt" transform="translate(48,30)"><path d="M3 -12 L-5 1 L1 1 L-3 12 L8 -3 L2 -3 Z" fill="#f4a23c"/></g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Trigger</text>
<text class="desc"  x="660" y="338" text-anchor="middle">The controller fires</text>

<!-- CARD 4 — DETER -->
<rect x="813" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(919,128)">
  <clipPath id="c4"><rect x="-90" y="-84" width="180" height="168" rx="12"/></clipPath>
  <g clip-path="url(#c4)">
    <rect x="-90" y="-84" width="180" height="168" fill="url(#night)"/>
    <circle cx="-58" cy="-58" r="8" fill="#cfe0d6" opacity="0.8"/>
    <path d="M-90 52 Q0 40 90 52 L90 84 L-90 84 Z" fill="#16243a"/>
    <!-- sky-dancer -->
    <g transform="translate(16,30) scale(0.92)"><use href="#skydancer"/></g>
    <!-- bear fleeing (left, flipped) -->
    <g transform="translate(-50,44) scale(-0.6,0.6)"><g class="flee"><use href="#bear"/></g></g>
  </g>
</g>
<text class="step" x="919" y="280" text-anchor="middle">04</text>
<text class="title" x="919" y="312" text-anchor="middle">Deter</text>
<text class="desc"  x="919" y="338" text-anchor="middle">The sky-dancer scares it off</text>
</svg>
