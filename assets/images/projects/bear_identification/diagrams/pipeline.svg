<svg viewBox="0 0 1062 380" xmlns="http://www.w3.org/2000/svg" font-family="Mulish, Helvetica, Arial, sans-serif">
<defs>
  <linearGradient id="forest" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3f5a3a"/><stop offset="100%" stop-color="#243a26"/></linearGradient>
  <linearGradient id="crop" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1b3a33"/><stop offset="100%" stop-color="#0f2a25"/></linearGradient>
  <linearGradient id="space" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e3a4a"/><stop offset="100%" stop-color="#10303a"/></linearGradient>
  <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0e3a4a"/><stop offset="100%" stop-color="#176074"/></linearGradient>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0 1 L9 5 L0 9 Z" fill="#e29578"/></marker>
  <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1c2b28" flood-opacity="0.08"/></filter>
  <style>
    .title { font-family: Newsreader, Georgia, 'Times New Roman', serif; font-size: 26px; font-weight: 600; fill: #161616; }
    .desc  { font-size: 15px; fill: #60626a; }
    .step  { font-size: 13px; font-weight: 700; letter-spacing: 0.12em; fill: #e29578; }
    .chip  { font-size: 11px; font-weight: 700; fill: #fff; }
    .prowl { transform-box: fill-box; transform-origin: 50% 50%; animation: prowl 4s ease-in-out infinite; }
    .scan  { animation: scan 2.4s ease-in-out infinite; }
    .qpt   { animation: qpt 2.2s ease-in-out infinite; }
    .match { animation: glow 2.4s ease-in-out infinite; }
    @keyframes prowl { 0%,100%{transform:translateX(0)} 50%{transform:translateX(6px)} }
    @keyframes scan  { 0%,100%{opacity:0.5} 50%{opacity:1} }
    @keyframes qpt   { 0%,100%{opacity:0.5;r:4} 50%{opacity:1;r:6} }
    @keyframes glow  { 0%,100%{opacity:0.6} 50%{opacity:1} }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <!-- brown bear, side profile (faces right) -->
  <g id="bear" fill="#6e4a30">
    <ellipse cx="0" cy="0" rx="26" ry="16"/>
    <circle cx="22" cy="-7" r="11"/>
    <circle cx="16" cy="-16" r="4.2"/><circle cx="29" cy="-16" r="4.2"/>
    <ellipse cx="32" cy="-4" rx="6" ry="4.5" fill="#5a3c26"/><circle cx="37" cy="-5" r="1.5" fill="#221913"/>
    <circle cx="24" cy="-9" r="1.5" fill="#221913"/>
    <rect x="-18" y="9" width="9" height="15" rx="3"/><rect x="-2" y="11" width="9" height="14" rx="3"/><rect x="13" y="10" width="9" height="14" rx="3"/>
  </g>
  <!-- brown bear, frontal face -->
  <g id="bearface">
    <circle cx="-34" cy="-32" r="16" fill="#6e4a30"/><circle cx="34" cy="-32" r="16" fill="#6e4a30"/>
    <circle cx="-34" cy="-32" r="7.5" fill="#5a3c26"/><circle cx="34" cy="-32" r="7.5" fill="#5a3c26"/>
    <ellipse cx="0" cy="0" rx="42" ry="39" fill="#6e4a30"/>
    <ellipse cx="0" cy="19" rx="23" ry="19" fill="#8a6648"/>
    <circle cx="-17" cy="-6" r="4.5" fill="#221913"/><circle cx="17" cy="-6" r="4.5" fill="#221913"/>
    <ellipse cx="0" cy="11" rx="9" ry="6.5" fill="#2a1d15"/>
    <path d="M0 17 V29" stroke="#2a1d15" stroke-width="2"/>
  </g>
  <!-- mini bear-face glyph for database rows -->
  <g id="facemini">
    <circle cx="-7" cy="-6" r="3.4" fill="#6e4a30"/><circle cx="7" cy="-6" r="3.4" fill="#6e4a30"/>
    <ellipse cx="0" cy="0" rx="9" ry="8.5" fill="#6e4a30"/>
    <ellipse cx="0" cy="4" rx="5" ry="4" fill="#8a6648"/>
    <ellipse cx="0" cy="2.5" rx="2" ry="1.6" fill="#2a1d15"/>
  </g>
</defs>

<g stroke="#e29578" stroke-width="3.5" fill="none" stroke-linecap="round">
  <line x1="250" y1="134" x2="291" y2="134" marker-end="url(#arrow)"/>
  <line x1="509" y1="134" x2="550" y2="134" marker-end="url(#arrow)"/>
  <line x1="768" y1="134" x2="809" y2="134" marker-end="url(#arrow)"/>
</g>

<!-- CARD 1 — PHOTO -->
<rect x="36" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(142,128)">
  <rect x="-66" y="-50" width="132" height="100" rx="9" fill="#eef5f2" stroke="#cdd4d6" stroke-width="2"/>
  <clipPath id="ph"><rect x="-64" y="-48" width="128" height="96" rx="8"/></clipPath>
  <g clip-path="url(#ph)">
    <rect x="-64" y="-48" width="128" height="96" fill="url(#forest)"/>
    <g stroke="#5d7a52" stroke-width="6" opacity="0.5" stroke-linecap="round"><path d="M-44 48 V-10"/><path d="M40 48 V4"/><path d="M10 48 V-20"/></g>
    <path d="M-64 34 Q0 26 64 34 L64 48 L-64 48 Z" fill="#1c3320"/>
    <g transform="translate(-2,28) scale(0.66)"><g class="prowl"><use href="#bear"/></g></g>
  </g>
  <g transform="translate(-50,-38)"><circle r="3" fill="#e8232a"/></g>
  <text x="58" y="42" text-anchor="end" font-size="8" font-weight="700" fill="#dfe7e0" font-family="Mulish, monospace" opacity="0.9">22:14</text>
</g>
<text class="step" x="142" y="280" text-anchor="middle">01</text>
<text class="title" x="142" y="312" text-anchor="middle">Photo</text>
<text class="desc"  x="142" y="338" text-anchor="middle">A camera-trap image</text>

<!-- CARD 2 — DETECT FACE -->
<rect x="295" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(401,128)">
  <rect x="-78" y="-58" width="156" height="116" rx="12" fill="url(#crop)"/>
  <g stroke="#3f6f5f" stroke-width="1" opacity="0.4"><path d="M-26 -58 V58 M26 -58 V58 M-78 -19 H78 M-78 19 H78"/></g>
  <use href="#bearface"/>
  <!-- segmentation contour hugging the head -->
  <path class="scan" d="M-50 -30 Q-58 -50 -34 -50 Q-20 -58 0 -56 Q20 -58 34 -50 Q58 -50 50 -30 Q58 -8 50 20 Q40 50 0 52 Q-40 50 -50 20 Q-58 -8 -50 -30 Z"
        fill="none" stroke="#e29578" stroke-width="2.6" stroke-dasharray="5 4"/>
  <!-- crop brackets -->
  <g stroke="#83c5be" stroke-width="3" fill="none" stroke-linecap="round">
    <path d="M-70 -40 L-70 -52 L-58 -52"/><path d="M58 -52 L70 -52 L70 -40"/><path d="M-70 40 L-70 52 L-58 52"/><path d="M58 52 L70 52 L70 40"/>
  </g>
  <g transform="translate(-34,-44)"><rect x="-22" y="-10" width="44" height="18" rx="9" fill="#e29578"/><text class="chip" x="0" y="3.5" text-anchor="middle" font-size="10">face</text></g>
</g>
<text class="step" x="401" y="280" text-anchor="middle">02</text>
<text class="title" x="401" y="312" text-anchor="middle">Detect face</text>
<text class="desc"  x="401" y="338" text-anchor="middle">Head found &amp; cut out</text>

<!-- CARD 3 — EMBED -->
<rect x="554" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(660,128)">
  <rect x="-78" y="-58" width="156" height="116" rx="12" fill="url(#space)"/>
  <g stroke="#2f5563" stroke-width="1" opacity="0.6"><path d="M-66 40 H66" /><path d="M-58 48 V-46"/></g>
  <!-- existing individuals: clusters of embedded points -->
  <g fill="#5fb0bb" opacity="0.85">
    <circle cx="-34" cy="-28" r="3"/><circle cx="-26" cy="-34" r="3"/><circle cx="-40" cy="-20" r="3"/><circle cx="-30" cy="-22" r="3"/>
    <circle cx="36" cy="-30" r="3"/><circle cx="44" cy="-22" r="3"/><circle cx="32" cy="-22" r="3"/>
    <circle cx="40" cy="22" r="3"/><circle cx="48" cy="14" r="3"/><circle cx="34" cy="14" r="3"/>
  </g>
  <!-- target cluster the query lands in -->
  <circle cx="-26" cy="20" r="22" fill="none" stroke="#83c5be" stroke-width="1.4" stroke-dasharray="3 3" opacity="0.8"/>
  <g fill="#83c5be"><circle cx="-32" cy="14" r="3"/><circle cx="-18" cy="16" r="3"/><circle cx="-30" cy="28" r="3"/></g>
  <!-- query embedding (this bear) -->
  <circle class="qpt" cx="-24" cy="22" r="5" fill="#e29578"/>
  <g transform="translate(40,-44)"><rect x="-30" y="-10" width="60" height="18" rx="9" fill="#006d77"/><text class="chip" x="0" y="3.5" text-anchor="middle" font-size="9.5">fingerprint</text></g>
</g>
<text class="step" x="660" y="280" text-anchor="middle">03</text>
<text class="title" x="660" y="312" text-anchor="middle">Embed</text>
<text class="desc"  x="660" y="338" text-anchor="middle">A point in face-space</text>

<!-- CARD 4 — MATCH -->
<rect x="813" y="28" width="212" height="212" rx="20" fill="#fbf6f6" stroke="#ede0d4" stroke-width="2" filter="url(#cardshadow)"/>
<g transform="translate(919,128)">
  <rect x="-80" y="-64" width="160" height="128" rx="12" fill="url(#panel)"/>
  <text class="chip" x="-66" y="-46" font-size="10" fill="#cfe9e0" letter-spacing="0.08em">KNOWN BEARS</text>
  <g transform="translate(0,-24)"><rect x="-66" y="-12" width="132" height="22" rx="6" fill="#0a4a55"/><g transform="translate(-50,-1)"><use href="#facemini"/></g><text class="chip" x="48" y="3" text-anchor="end" font-size="11" fill="#9fc3c0">BF03</text></g>
  <g transform="translate(0,4)" class="match"><rect x="-68" y="-13" width="136" height="24" rx="6" fill="#0a7d86" stroke="#3fd07a" stroke-width="2.5"/><g transform="translate(-50,-1)"><use href="#facemini"/></g><text class="chip" x="22" y="3" text-anchor="end">BF32</text><circle cx="52" cy="-1" r="9" fill="#3fd07a"/><path d="M48 -1 L51 2 L56 -4" stroke="#fff" stroke-width="1.8" fill="none"/></g>
  <g transform="translate(0,32)"><rect x="-66" y="-12" width="132" height="22" rx="6" fill="#0a4a55"/><g transform="translate(-50,-1)"><use href="#facemini"/></g><text class="chip" x="48" y="3" text-anchor="end" font-size="11" fill="#9fc3c0">BF47</text></g>
  <g transform="translate(0,54)"><rect x="-44" y="-10" width="88" height="20" rx="10" fill="#15463f"/><text class="chip" x="0" y="4" text-anchor="middle" font-size="11">0.92 match</text></g>
</g>
<text class="step" x="919" y="280" text-anchor="middle">04</text>
<text class="title" x="919" y="312" text-anchor="middle">Match</text>
<text class="desc"  x="919" y="338" text-anchor="middle">The same individual</text>
</svg>
