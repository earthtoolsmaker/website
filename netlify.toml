[build]
  command = "hugo"
  publish = "public"

[build.environment]
  HUGO_VERSION = "0.145.0"

# Persist Hugo's image-processing cache between builds so image variants
# are not regenerated on every deploy (resources/_gen is gitignored).
[[plugins]]
  package = "netlify-plugin-cache"

  [plugins.inputs]
    paths = ["resources"]

# Old HuggingFace-derived "Spaces" section was renamed to "Live Demos".
# Preserve any inbound links to the previous /spaces/ URLs.
[[redirects]]
  from = "/spaces/*"
  to = "/demos/:splat"
  status = 301
